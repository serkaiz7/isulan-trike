<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - GPS Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; }
        #map { height: 45vh; width: 100%; z-index: 1; background: #cbd5e1; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-div-icon { background: none; border: none; }
        .marker-label { background: white; padding: 2px 8px; border-radius: 10px; font-weight: 800; font-size: 10px; border: 2px solid #10b981; margin-top: -40px; white-space: nowrap; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-5 bg-emerald-700 text-white border-2 border-emerald-500 rounded-2xl font-black">Register</button>
        </div>
    </div>

    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div class="absolute top-4 left-4 right-4 z-[1000] glass p-3 rounded-2xl flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-bold" id="user-initial">U</div>
                <div>
                    <p id="user-display" class="font-black text-sm text-gray-800">User</p>
                    <p id="role-display" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Role</p>
                </div>
            </div>
            <button onclick="logout()" class="p-3 text-red-500 bg-red-50 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <div id="passenger-panel" class="hidden">
                <div id="p-status-box" class="hidden mb-6 p-5 rounded-3xl bg-emerald-600 text-white shadow-lg animate-pop">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] font-black uppercase opacity-70">Status</p>
                        <button onclick="cancelBooking()" class="text-[10px] bg-white/20 px-2 py-1 rounded-lg">Cancel</button>
                    </div>
                    <p id="p-status-text" class="text-lg font-black italic">Connecting...</p>
                </div>
                <input id="dest-input" type="text" placeholder="Where are you going?" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500 mb-6 shadow-inner">
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <div id="driver-panel" class="hidden">
                <div id="d-active-box" class="hidden w-full p-6 bg-emerald-50 border-2 border-emerald-200 rounded-[2.5rem] mb-6 text-center animate-pop">
                    <p class="text-xs font-black text-emerald-600 uppercase mb-2 italic">Active Trip</p>
                    <h2 id="current-p-name" class="text-2xl font-black mb-1">...</h2>
                    <p id="current-p-dest" class="text-sm font-bold text-gray-500 mb-6">...</p>
                    <button onclick="completeTrip()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">MARK ARRIVED</button>
                </div>
                <button id="duty-btn" onclick="toggleDuty()" class="w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl transition-all">GO ONLINE</button>
            </div>
        </div>
    </div>

    <div id="rating-modal" class="hidden fixed inset-0 z-[7000] bg-black/80 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center animate-pop">
            <h3 class="text-2xl font-black italic mb-6">How was your ride?</h3>
            <div class="star-rating flex justify-center gap-3 mb-8 text-4xl text-gray-200">
                <i class="fa-solid fa-star" onclick="setRating(1)"></i>
                <i class="fa-solid fa-star" onclick="setRating(2)"></i>
                <i class="fa-solid fa-star" onclick="setRating(3)"></i>
                <i class="fa-solid fa-star" onclick="setRating(4)"></i>
                <i class="fa-solid fa-star" onclick="setRating(5)"></i>
            </div>
            <button onclick="submitRating()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">SUBMIT REVIEW</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG (Ensure you have your actual keys here)
        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL_PATH = `artifacts/isulan-trike-2026/public/data/users`;

        let userUid, userData, map, unsubscribe, currentRating = 0, lastDriverId = null, lastUpdate = 0;
        let markers = {}; 

        // CUSTOM ICONS
        const trikeIcon = (name) => L.divIcon({ html: `<div class="flex flex-col items-center"><div class="marker-label">${name}</div><div class="bg-emerald-500 p-2 rounded-full shadow-lg border-2 border-white text-white"><i class="fa-solid fa-motorcycle"></i></div></div>`, className: 'custom-div-icon', iconSize: [40, 40], iconAnchor: [20, 20] });
        const passIcon = (name) => L.divIcon({ html: `<div class="flex flex-col items-center"><div class="marker-label" style="border-color:#3b82f6">${name}</div><div class="bg-blue-500 p-2 rounded-full shadow-lg border-2 border-white text-white"><i class="fa-solid fa-street-view"></i></div></div>`, className: 'custom-div-icon', iconSize: [40, 40], iconAnchor: [20, 20] });

        window.handleAuth = async (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const cred = await createUserWithEmailAndPassword(auth, e, p);
                    const role = confirm("Register as Driver?") ? "driver" : "passenger";
                    await setDoc(doc(db, COLL_PATH, cred.user.uid), { name: e.split('@')[0], role, tripCount: 0, totalRating: 0, isOnline: false, lat: 6.6, lng: 124.6 });
                }
            } catch (err) { alert(err.message); }
        };

        window.logout = async () => {
            if(userData.role === 'driver') await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: false });
            await signOut(auth);
            location.reload();
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userUid = u.uid;
                const snap = await getDoc(doc(db, COLL_PATH, userUid));
                userData = snap.data();
                launchApp();
            } else document.getElementById('auth-screen').classList.remove('hidden');
        });

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('user-initial').innerText = userData.name[0].toUpperCase();
            document.getElementById('role-display').innerText = userData.role;
            document.getElementById(userData.role + '-panel').classList.remove('hidden');

            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const now = Date.now();
                    if(now - lastUpdate > 5000) { 
                        lastUpdate = now;
                        updateDoc(doc(db, COLL_PATH, userUid), { lat: latitude, lng: longitude });
                    }
                }, null, { enableHighAccuracy: true });
            }
            listen();
        }

        function listen() {
            if(unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(collection(db, COLL_PATH), snap => {
                const list = document.getElementById('driver-list');
                if(userData.role === 'passenger') list.innerHTML = '';
                
                let points = [];

                snap.forEach(dDoc => {
                    const data = dDoc.data();
                    const id = dDoc.id;

                    if(id === userUid) {
                        userData = data;
                        syncUI(data);
                        points.push([data.lat, data.lng]);
                        return;
                    }

                    // CRITICAL FIX: Determine exactly who should be on the map
                    const isVisibleDriver = (userData.role === 'passenger' && data.role === 'driver' && data.isOnline);
                    const isMyPassenger = (userData.role === 'driver' && userData.request?.pId === id);
                    const isMyDriver = (userData.role === 'passenger' && userData.request?.dId === id);

                    if((isVisibleDriver || isMyPassenger || isMyDriver) && data.lat) {
                        const icon = data.role === 'driver' ? trikeIcon(data.name) : passIcon(data.name);
                        
                        if(!markers[id]) markers[id] = L.marker([data.lat, data.lng], { icon }).addTo(map);
                        else markers[id].setLatLng([data.lat, data.lng]);

                        // Add to focus points if they are my current trip partner
                        if(isMyPassenger || isMyDriver) points.push([data.lat, data.lng]);
                    } else if(markers[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }

                    if(isVisibleDriver && !data.request) renderDriverCard(id, data);
                    
                    if(userData.role === 'passenger' && data.lastFinishedTrip?.pId === userUid) {
                        lastDriverId = id;
                        document.getElementById('rating-modal').classList.remove('hidden');
                    }
                });

                // Focus map if active trip
                if(points.length > 1 && userData.request?.status === 'accepted') {
                    map.fitBounds(L.latLngBounds(points), { padding: [100, 100], maxZoom: 17 });
                }
            });
        }

        function syncUI(data) {
            if(userData.role === 'driver') {
                const box = document.getElementById('d-active-box');
                const duty = document.getElementById('duty-btn');
                if(data.request) {
                    duty.classList.add('hidden');
                    if(data.request.status === 'pending' && confirm(`Request from ${data.request.pName}?`)) {
                        updateDoc(doc(db, COLL_PATH, userUid), { "request.status": "accepted" });
                    }
                    if(data.request.status === 'accepted') {
                        box.classList.remove('hidden');
                        document.getElementById('current-p-name').innerText = data.request.pName;
                        document.getElementById('current-p-dest').innerText = data.request.dest;
                    }
                } else { box.classList.add('hidden'); duty.classList.remove('hidden'); }
            } else {
                const sBox = document.getElementById('p-status-box');
                if(data.request) {
                    sBox.classList.remove('hidden');
                    document.getElementById('p-status-text').innerText = data.request.status === 'accepted' ? "Driver is on the way!" : "Waiting for driver...";
                } else sBox.classList.add('hidden');
            }
        }

        window.toggleDuty = async () => {
            const s = !userData.isOnline;
            const b = document.getElementById('duty-btn');
            b.innerText = s ? "GO OFFLINE" : "GO ONLINE";
            b.className = s ? "w-full py-12 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl shadow-lg" : "w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: s });
        };

        window.bookDriver = async (dId) => {
            const dest = document.getElementById('dest-input').value;
            if(!dest) return alert("Enter destination");
            await updateDoc(doc(db, COLL_PATH, dId), { request: { pId: userUid, pName: userData.name, dest, status: 'pending' } });
            await updateDoc(doc(db, COLL_PATH, userUid), { request: { dId, status: 'pending' } });
        };

        window.completeTrip = async () => {
            const pId = userData.request.pId;
            await updateDoc(doc(db, COLL_PATH, userUid), { lastFinishedTrip: { pId, time: Date.now() }, request: deleteField(), tripCount: increment(1) });
        };

        window.setRating = (v) => {
            currentRating = v;
            document.querySelectorAll('.star-rating i').forEach((s, i) => s.className = i < v ? 'fa-solid fa-star active' : 'fa-solid fa-star');
        };

        window.submitRating = async () => {
            await updateDoc(doc(db, COLL_PATH, lastDriverId), { totalRating: increment(currentRating), tripCount: increment(1), lastFinishedTrip: deleteField() });
            await updateDoc(doc(db, COLL_PATH, userUid), { request: deleteField() });
            document.getElementById('rating-modal').classList.add('hidden');
        };

        function renderDriverCard(id, data) {
            const avg = data.tripCount > 0 ? (data.totalRating / data.tripCount).toFixed(1) : "5.0";
            document.getElementById('driver-list').innerHTML += `
                <div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
                        <div><p class="font-black text-gray-800 text-sm">${data.name} <span class="text-amber-400 ml-1"><i class="fa-solid fa-star"></i> ${avg}</span></p></div>
                    </div>
                    <button onclick="bookDriver('${id}')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black">BOOK</button>
                </div>`;
        }
    </script>
</body>
</html>
