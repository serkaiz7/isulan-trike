<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 40vh; width: 100%; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <!-- 1. AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
            <p class="opacity-80 font-medium text-lg text-emerald-100">Premium Real-time Transport</p>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold placeholder:text-white/50">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold placeholder:text-white/50">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-5 bg-emerald-700 text-white border-2 border-emerald-500 rounded-2xl font-black">Register</button>
        </div>
    </div>

    <!-- 2. SETUP SCREEN -->
    <div id="setup-screen" class="hidden fixed inset-0 z-[5100] bg-white flex flex-col p-10 items-center justify-center">
        <h2 class="text-3xl font-black mb-8 italic">Finish Profile</h2>
        <div class="w-full max-w-xs space-y-4 text-center">
            <input id="setup-name" type="text" placeholder="Your Full Name" class="w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <select id="setup-role" class="w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none" onchange="togglePlateField()">
                <option value="passenger">Passenger</option>
                <option value="driver">Driver</option>
            </select>
            <input id="setup-plate" type="text" placeholder="Plate Number (ABC-123)" class="hidden w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <button onclick="saveInitialProfile()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">Save & Start</button>
        </div>
    </div>

    <!-- 3. MAIN APP UI -->
    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div class="absolute top-4 left-4 right-4 z-[1000] glass p-3 rounded-2xl flex justify-between items-center shadow-lg border border-white/50">
            <div class="flex items-center gap-3">
                <div id="status-indicator" class="w-3 h-3 bg-red-500 rounded-full animate-pulse absolute -top-1 -left-1"></div>
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center">
                    <i id="role-icon" class="fa-solid fa-person"></i>
                </div>
                <div>
                    <p id="user-display" class="font-black text-sm text-gray-800 line-clamp-1">User</p>
                    <p id="role-display" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Passenger</p>
                </div>
            </div>
            <button onclick="logout()" class="p-3 text-red-500 bg-red-50 rounded-xl hover:bg-red-100 transition-colors">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <!-- Passenger View -->
            <div id="passenger-panel" class="hidden">
                <div id="p-status-box" class="hidden mb-6 p-5 rounded-3xl animate-pop bg-blue-600 text-white shadow-lg">
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[10px] font-black uppercase opacity-70">Ride Details</p>
                        <button onclick="cancelBooking()" class="text-[10px] bg-white/20 px-2 py-1 rounded-lg">Cancel</button>
                    </div>
                    <p id="p-status-text" class="text-lg font-black italic">Tracking Driver...</p>
                </div>
                <div class="mb-6 relative">
                    <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input id="dest-input" type="text" placeholder="Where are you going?" class="w-full p-5 pl-12 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
                </div>
                <h3 class="font-black text-gray-800 mb-4 text-xs uppercase tracking-widest opacity-50">Nearby Drivers</h3>
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <!-- Driver View -->
            <div id="driver-panel" class="hidden">
                <div id="d-active-box" class="hidden w-full p-6 bg-emerald-50 border-2 border-emerald-200 rounded-[2.5rem] mb-6 text-center animate-pop">
                    <p class="text-xs font-black text-emerald-600 uppercase mb-2">Live Trip</p>
                    <h2 id="current-p-name" class="text-2xl font-black mb-1">...</h2>
                    <p id="current-p-dest" class="text-sm font-bold text-gray-500 italic mb-6">...</p>
                    <button onclick="completeTrip()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">ARRIVED / COMPLETE</button>
                </div>
                <div id="driver-offline-ui">
                    <button id="duty-btn" onclick="toggleDuty()" class="w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl">GO ONLINE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Request Modal -->
    <div id="request-modal" class="hidden fixed inset-0 z-[6000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-pop text-center">
            <i class="fa-solid fa-bell text-emerald-500 text-4xl mb-4 animate-bounce"></i>
            <h3 class="text-2xl font-black italic mb-1">New Booking!</h3>
            <p id="modal-p-name" class="font-bold text-gray-800">Passenger</p>
            <div class="my-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                <p id="modal-p-dest" class="font-bold text-emerald-600 italic">...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="rejectBooking()" class="flex-1 py-4 font-bold text-gray-400">Decline</button>
                <button onclick="acceptBooking()" class="flex-[2] py-4 bg-emerald-600 text-white rounded-2xl font-black">ACCEPT</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG - Replace with your keys
        const firebaseConfig = {
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL_PATH = `artifacts/isulan-trike-2026/public/data/users`;

        let userUid, userData, map, userMarker, markers = {};

        // 1. AUTH LOGIC
        window.handleAuth = async (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
                else await createUserWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        window.logout = async () => {
            if(userData.role === 'driver') await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: false });
            await signOut(auth);
            location.reload(); // Redirects to Login screen
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL_PATH, userUid));
                if(snap.exists()) { userData = snap.data(); launchApp(); }
                else { 
                    document.getElementById('auth-screen').classList.add('hidden'); 
                    document.getElementById('setup-screen').classList.remove('hidden'); 
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-ui').classList.add('hidden');
            }
        });

        // 2. SETUP & GPS TRACKING
        window.saveInitialProfile = async () => {
            const name = document.getElementById('setup-name').value;
            const role = document.getElementById('setup-role').value;
            if(!name) return alert("Name required");
            userData = { uid: userUid, name, role, plate: document.getElementById('setup-plate').value || 'N/A', isOnline: false };
            await setDoc(doc(db, COLL_PATH, userUid), userData);
            launchApp();
        };

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('role-display').innerText = userData.role;
            document.getElementById(userData.role + '-panel').classList.remove('hidden');

            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Start Real-time GPS Watching
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    updateMyPosition(latitude, longitude);
                }, err => console.error(err), { enableHighAccuracy: true });
            }

            listenForUpdates();
        }

        async function updateMyPosition(lat, lng) {
            if(!userMarker) {
                userMarker = L.circleMarker([lat, lng], { radius: 8, color: '#fff', fillColor: '#10b981', fillOpacity: 1, weight: 3 }).addTo(map);
            } else {
                userMarker.setLatLng([lat, lng]);
            }
            map.panTo([lat, lng]);
            // Sync to Firebase
            await updateDoc(doc(db, COLL_PATH, userUid), { lat, lng });
        }

        // 3. REALTIME SYNC
        function listenForUpdates() {
            onSnapshot(collection(db, COLL_PATH), snap => {
                if(userData.role === 'passenger') document.getElementById('driver-list').innerHTML = '';
                
                snap.forEach(dDoc => {
                    const data = dDoc.data();
                    if(dDoc.id === userUid) {
                        handleMyData(data);
                        return;
                    }

                    // Map Marker Logic
                    if(data.lat && data.lng && (data.isOnline || (data.request?.pId === userUid))) {
                        if(!markers[dDoc.id]) {
                            markers[dDoc.id] = L.marker([data.lat, data.lng], {
                                icon: L.divIcon({ html: `<i class="fa-solid fa-motorcycle text-emerald-600 text-2xl"></i>`, className: 'custom-div-icon' })
                            }).addTo(map);
                        } else {
                            markers[dDoc.id].setLatLng([data.lat, data.lng]);
                        }
                    } else if (markers[dDoc.id]) {
                        map.removeLayer(markers[dDoc.id]);
                        delete markers[dDoc.id];
                    }

                    // UI Logic for Passengers
                    if(userData.role === 'passenger' && data.role === 'driver' && data.isOnline) {
                        renderDriverCard(dDoc.id, data);
                    }
                });
            });
        }

        function handleMyData(data) {
            if(userData.role === 'driver' && data.request?.status === 'pending') {
                document.getElementById('modal-p-name').innerText = data.request.pName;
                document.getElementById('modal-p-dest').innerText = "To: " + data.request.dest;
                document.getElementById('request-modal').classList.remove('hidden');
            }
            if(userData.role === 'driver' && data.request?.status === 'accepted') {
                document.getElementById('driver-offline-ui').classList.add('hidden');
                document.getElementById('d-active-box').classList.remove('hidden');
                document.getElementById('current-p-name').innerText = data.request.pName;
                document.getElementById('current-p-dest').innerText = "To: " + data.request.dest;
            }
        }

        // HELPERS
        window.toggleDuty = async () => {
            userData.isOnline = !userData.isOnline;
            document.getElementById('status-indicator').className = userData.isOnline ? 'w-3 h-3 bg-emerald-500 rounded-full animate-pulse absolute -top-1 -left-1' : 'w-3 h-3 bg-red-500 rounded-full absolute -top-1 -left-1';
            const btn = document.getElementById('duty-btn');
            btn.innerText = userData.isOnline ? "GO OFFLINE" : "GO ONLINE";
            btn.className = userData.isOnline ? "w-full py-8 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl shadow-lg shadow-emerald-200" : "w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: userData.isOnline });
        };

        window.bookDriver = async (dId) => {
            const dest = document.getElementById('dest-input').value;
            if(!dest) return alert("Enter destination");
            await updateDoc(doc(db, COLL_PATH, dId), { request: { pId: userUid, pName: userData.name, dest, status: 'pending' } });
            document.getElementById('p-status-box').classList.remove('hidden');
        };

        window.acceptBooking = async () => {
            await updateDoc(doc(db, COLL_PATH, userUid), { "request.status": 'accepted' });
            document.getElementById('request-modal').classList.add('hidden');
        };

        window.completeTrip = async () => {
            await updateDoc(doc(db, COLL_PATH, userUid), { request: deleteField() });
            location.reload();
        };

        function renderDriverCard(id, data) {
            document.getElementById('driver-list').innerHTML += `
                <div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
                        <div><p class="font-black text-gray-800 text-sm">${data.name}</p><p class="text-[10px] text-gray-400 font-bold">${data.plate}</p></div>
                    </div>
                    <button onclick="bookDriver('${id}')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black">BOOK</button>
                </div>`;
        }

        window.togglePlateField = () => document.getElementById('setup-plate').classList.toggle('hidden', document.getElementById('setup-role').value !== 'driver');
    </script>
</body>
</html>
