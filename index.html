<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Pro - Hybrid Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        #map { height: 40vh; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-primary { @apply bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all w-full mb-2; }
        .input-field { @apply w-full p-4 bg-gray-100 rounded-2xl mb-3 font-bold outline-none border-2 border-transparent focus:border-green-500 text-gray-800; }
        .badge { @apply px-2 py-1 rounded text-[10px] font-bold uppercase; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- 1. MULTI-AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-green-600 flex flex-col items-center justify-center p-6 text-white overflow-y-auto">
        <i class="fa-solid fa-motorcycle text-6xl mb-4"></i>
        <h1 class="text-3xl font-black mb-6 tracking-tighter italic">IsulanTrike Login</h1>
        
        <div class="w-full max-w-sm bg-white p-6 rounded-[2rem] text-gray-800 shadow-2xl">
            <!-- Email Login -->
            <div id="email-section">
                <input id="auth-email" type="email" placeholder="Email" class="input-field">
                <input id="auth-pass" type="password" placeholder="Password" class="input-field">
                <div class="flex gap-2">
                    <button onclick="handleEmailAuth('login')" class="btn-primary text-sm">Login</button>
                    <button onclick="handleEmailAuth('register')" class="btn-primary text-sm bg-gray-800">Register</button>
                </div>
            </div>

            <div class="relative my-4 flex items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="px-3 text-xs font-bold text-gray-400">OR</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <!-- Anonymous Option -->
            <button onclick="handleAnonymousAuth()" class="w-full py-3 rounded-xl border-2 border-gray-100 font-bold text-gray-500 hover:bg-gray-50">
                <i class="fa-solid fa-user-secret mr-2"></i> Continue as Guest
            </button>
            <p class="text-[10px] text-center mt-3 text-gray-400 font-medium">Guest users cannot save trip records or earnings.</p>
        </div>
    </div>

    <!-- 2. REGISTRATION DETAILS (For Email/Phone/New Users) -->
    <div id="profile-setup" class="hidden fixed inset-0 z-[5100] bg-white flex flex-col items-center justify-center p-8">
        <h2 class="text-2xl font-black mb-6">Complete your Profile</h2>
        <input id="reg-name" type="text" placeholder="Full Name" class="input-field">
        <select id="reg-role" class="input-field" onchange="togglePlateInput()">
            <option value="passenger">Passenger</option>
            <option value="driver">Driver</option>
        </select>
        <input id="reg-plate" type="text" placeholder="Plate Number" class="input-field hidden">
        <button onclick="saveProfile()" class="btn-primary">Start Using IsulanTrike</button>
    </div>

    <!-- 3. DASHBOARD / RECORDS PANEL -->
    <div id="landing-page" class="hidden fixed inset-0 z-[4500] bg-white flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-2xl font-black">Hi, <span id="land-name" class="text-green-600">User</span></h2>
                <span id="account-badge" class="badge bg-gray-200">Guest</span>
            </div>
            <button onclick="goToApp()" class="bg-green-600 text-white px-6 py-3 rounded-2xl font-black shadow-lg">Open Map</button>
        </div>

        <div id="records-container" class="flex-1 overflow-y-auto">
            <!-- Driver Specific: Earnings -->
            <div id="driver-earnings" class="hidden grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-2xl border-2 border-green-100">
                    <p class="text-[10px] font-bold text-green-600 uppercase">Today's Earning</p>
                    <p class="text-2xl font-black text-gray-800">₱<span id="total-earnings">0</span></p>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                    <p class="text-[10px] font-bold text-blue-600 uppercase">Trips Done</p>
                    <p class="text-2xl font-black text-gray-800" id="trip-count">0</p>
                </div>
            </div>

            <h3 class="font-black text-gray-800 mb-4 italic">Recent Activity</h3>
            <div id="history-list" class="space-y-3">
                <!-- Anonymous Block -->
                <div id="anon-blocker" class="hidden bg-gray-100 p-10 rounded-[2rem] text-center">
                    <i class="fa-solid fa-lock text-3xl text-gray-300 mb-4"></i>
                    <p class="text-sm font-bold text-gray-500">History is locked for Guests.<br>Register an account to see records.</p>
                </div>
            </div>
        </div>
        <button onclick="auth.signOut().then(()=>location.reload())" class="text-red-500 font-bold text-xs mt-4">Sign Out</button>
    </div>

    <!-- Map UI and Logic follows standard structure... -->
    <div id="app-ui" class="hidden flex-col h-full">
        <div id="map"></div>
        <div class="flex-1 p-6 bg-white rounded-t-[2.5rem] -mt-10 z-[1001] shadow-2xl">
            <button onclick="showLanding()" class="text-xs font-bold text-green-600 mb-4">← Back to Records</button>
            <div id="role-panel-content"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = "isulan_pro_v2";

        let userUid, userData;

        // --- AUTH HANDLERS ---
        window.handleEmailAuth = (type) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Fill all fields");

            const action = type === 'login' ? signInWithEmailAndPassword : createUserWithEmailAndPassword;
            action(auth, email, pass).catch(err => alert(err.message));
        };

        window.handleAnonymousAuth = () => {
            signInAnonymously(auth);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL, userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    showLanding();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('profile-setup').classList.remove('hidden');
                }
            }
        });

        window.saveProfile = async () => {
            userData = {
                uid: userUid,
                name: document.getElementById('reg-name').value || "Guest",
                role: document.getElementById('reg-role').value,
                plate: document.getElementById('reg-plate').value || 'N/A',
                isAnonymous: auth.currentUser.isAnonymous,
                history: [],
                earnings: 0,
                tripCount: 0
            };
            await setDoc(doc(db, COLL, userUid), userData);
            document.getElementById('profile-setup').classList.add('hidden');
            showLanding();
        };

        // --- RECORDS DISPLAY LOGIC ---
        window.showLanding = () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
            
            document.getElementById('land-name').innerText = userData.name;
            const badge = document.getElementById('account-badge');
            
            if(userData.isAnonymous) {
                badge.innerText = "Guest Account";
                document.getElementById('history-list').innerHTML = '';
                document.getElementById('anon-blocker').classList.remove('hidden');
                document.getElementById('driver-earnings').classList.add('hidden');
            } else {
                badge.innerText = "Verified Account";
                badge.className = "badge bg-green-100 text-green-700";
                document.getElementById('anon-blocker').classList.add('hidden');
                renderHistory();
                
                if(userData.role === 'driver') {
                    document.getElementById('driver-earnings').classList.remove('hidden');
                    document.getElementById('total-earnings').innerText = userData.earnings || 0;
                    document.getElementById('trip-count').innerText = userData.tripCount || 0;
                }
            }
        };

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            (userData.history || []).reverse().forEach(trip => {
                const item = document.createElement('div');
                item.className = "p-4 bg-gray-50 rounded-2xl border-l-4 border-green-500 shadow-sm mb-2";
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="font-black text-sm">${trip.dest}</p>
                        <span class="text-[9px] font-bold text-green-600">₱21.00</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1">Pick: ${trip.pickup} • End: ${trip.time}</p>
                `;
                list.appendChild(item);
            });
        }

        // --- TRIP COMPLETION (Driver Side) ---
        window.completeTrip = async () => {
            const req = userData.incomingRequest;
            const record = {
                dest: req.dest,
                pickup: req.pickupName || "Current Location",
                time: new Date().toLocaleTimeString(),
                partner: req.pName,
                fare: 21
            };

            const driverRef = doc(db, COLL, userUid);
            if(!userData.isAnonymous) {
                await updateDoc(driverRef, {
                    history: arrayUnion(record),
                    earnings: increment(21),
                    tripCount: increment(1),
                    "incomingRequest.status": 'completed'
                });
            } else {
                await updateDoc(driverRef, { "incomingRequest.status": 'completed' });
            }
            alert("Trip Complete!");
        };

        window.togglePlateInput = () => {
            document.getElementById('reg-plate').classList.toggle('hidden', document.getElementById('reg-role').value !== 'driver');
        };

        window.goToApp = () => { /* Load Leaflet Map & GPS tracking */ };
    </script>
</body>
</html>
