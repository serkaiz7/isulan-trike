<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 55vh; width: 100%; transition: all 0.5s ease; }
        .btn-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .driver-marker { filter: hue-rotate(120deg); } /* Distinct color for drivers */
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <!-- 1. AUTH & SETUP -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-white flex flex-col p-8 justify-between">
        <div class="mt-12">
            <div class="w-20 h-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center mb-6">
                <span class="text-4xl">🛺</span>
            </div>
            <h1 class="text-5xl font-extrabold tracking-tighter">Isulan<span class="text-emerald-600">Trike</span></h1>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-semibold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-semibold">
            <button onclick="handleAuth('login')" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold shadow-xl">Sign In</button>
            <button id="btn-guest" onclick="handleAuth('anon')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold">Guest Access</button>
            <button onclick="handleAuth('register')" class="w-full py-2 text-emerald-600 font-bold text-sm">Create Account</button>
        </div>
    </div>

    <div id="setup-screen" class="hidden fixed inset-0 z-[5100] bg-white flex flex-col p-10 items-center justify-center">
        <h2 class="text-3xl font-black mb-6 italic">Account Type</h2>
        <div class="w-full max-w-xs space-y-4">
            <input id="setup-name" type="text" placeholder="Full Name" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
            <select id="setup-role" class="w-full p-5 bg-slate-100 rounded-2xl font-bold" onchange="togglePlate()">
                <option value="passenger">Passenger</option>
                <option value="driver">Driver</option>
            </select>
            <input id="setup-plate" type="text" placeholder="Plate #" class="hidden w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
            <button onclick="saveProfile()" class="btn-gradient w-full py-5 rounded-2xl text-white font-black shadow-lg">Start Using App</button>
        </div>
    </div>

    <!-- 2. MAIN APP INTERFACE -->
    <div id="app-ui" class="hidden fixed inset-0 z-[4500] bg-white flex flex-col">
        <div id="map"></div>
        
        <!-- Top Controls -->
        <div class="absolute top-6 left-6 right-6 z-[4600] flex justify-between items-center">
            <button onclick="processLogout()" class="p-4 bg-white rounded-2xl shadow-xl active:scale-90 transition-transform">
                <span class="text-xl">🚪</span>
            </button>
            <div id="status-tag" class="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-full uppercase tracking-widest">
                Searching...
            </div>
        </div>

        <!-- Bottom Panel -->
        <div class="flex-1 bg-white rounded-t-[3.5rem] -mt-12 z-[4550] p-8 shadow-[0_-20px_60px_rgba(0,0,0,0.1)] overflow-y-auto">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>

            <!-- Passenger View -->
            <div id="passenger-panel" class="hidden">
                <h3 class="text-2xl font-black mb-4">Drivers Online</h3>
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <!-- Driver View -->
            <div id="driver-panel" class="hidden">
                <div id="duty-card" onclick="toggleDuty()" class="w-full py-12 rounded-[2.5rem] bg-slate-50 border-4 border-dashed border-slate-200 text-slate-400 font-black text-2xl flex flex-col items-center justify-center cursor-pointer transition-all">
                    <span id="duty-text">GO ONLINE</span>
                    <span class="text-[10px] mt-2 opacity-60">Visibility: Offline</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. RIDE REQUEST MODAL -->
    <div id="pop-request" class="hidden fixed inset-0 z-[6000] bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[3rem] p-10 animate-pop">
            <p class="text-emerald-600 font-black text-[10px] uppercase mb-2">New Request Found!</p>
            <h3 id="req-name" class="text-3xl font-black mb-6 italic">...</h3>
            <button onclick="acceptRide()" class="w-full py-5 btn-gradient text-white rounded-3xl font-bold shadow-xl mb-3">Accept Ride</button>
            <button onclick="closePop()" class="w-full py-4 text-slate-300 font-bold">Ignore</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let userUid, userData, map, markers = {};

        // AUTH LOGIC
        window.handleAuth = (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if(type === 'anon') signInAnonymously(auth);
            else if(type === 'login') signInWithEmailAndPassword(auth, e, p).catch(alert);
            else createUserWithEmailAndPassword(auth, e, p).catch(alert);
        };

        window.processLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, "users", userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    startApp();
                } else if(user.isAnonymous) {
                    userData = { uid: userUid, name: "Guest", role: "passenger" };
                    await setDoc(doc(db, "users", userUid), userData);
                    startApp();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('setup-screen').classList.remove('hidden');
                }
            }
        });

        window.saveProfile = async () => {
            const name = document.getElementById('setup-name').value;
            const role = document.getElementById('setup-role').value;
            if(!name) return alert("Enter name");
            userData = { uid: userUid, name, role, plate: document.getElementById('setup-plate').value || 'N/A' };
            await setDoc(doc(db, "users", userUid), userData);
            location.reload();
        };

        // CORE APP LOGIC
        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            document.getElementById('status-tag').innerText = userData.role;

            if(!map) {
                map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }

            if(userData.role === 'passenger') listenForDrivers();
            if(userData.role === 'driver') listenForRequests();
        }

        // MUTUAL VISIBILITY: PASSENGER SEEING DRIVERS
        function listenForDrivers() {
            onSnapshot(collection(db, "online_drivers"), (snap) => {
                const list = document.getElementById('driver-list');
                list.innerHTML = '';
                
                snap.forEach(dDoc => {
                    const d = dDoc.data();
                    // Add Map Marker
                    if(!markers[dDoc.id]) {
                        markers[dDoc.id] = L.marker([d.lat, d.lng]).addTo(map).bindPopup(d.name);
                    }
                    // Add List Item
                    list.innerHTML += `
                        <div onclick="bookDriver('${dDoc.id}', '${d.name}')" class="p-5 bg-slate-50 rounded-3xl flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                            <div><p class="font-black text-slate-800">${d.name}</p><p class="text-[9px] text-emerald-500 font-bold uppercase">Online Now</p></div>
                            <span class="text-xl">🛺</span>
                        </div>`;
                });
            });
        }

        window.bookDriver = async (dId, dName) => {
            // Write to driver's specific request doc
            await setDoc(doc(db, "requests", dId), {
                pId: userUid,
                pName: userData.name,
                pLat: 6.6294, // In real app use geolocation
                pLng: 124.605,
                status: 'pending'
            });
            alert("Booking sent to " + dName);
        };

        // MUTUAL VISIBILITY: DRIVER SEEING PASSENGER
        window.toggleDuty = async () => {
            userData.isOnline = !userData.isOnline;
            const card = document.getElementById('duty-card');
            
            if(userData.isOnline) {
                card.className = "w-full py-12 rounded-[2.5rem] bg-emerald-600 text-white font-black text-2xl shadow-xl shadow-emerald-100 border-none scale-[1.02]";
                document.getElementById('duty-text').innerText = "ONLINE";
                await setDoc(doc(db, "online_drivers", userUid), {
                    name: userData.name,
                    lat: 6.6294,
                    lng: 124.605,
                    uid: userUid
                });
            } else {
                await deleteDoc(doc(db, "online_drivers", userUid));
                location.reload();
            }
        };

        function listenForRequests() {
            onSnapshot(doc(db, "requests", userUid), (snap) => {
                if(snap.exists()) {
                    const req = snap.data();
                    document.getElementById('req-name').innerText = req.pName;
                    document.getElementById('pop-request').classList.remove('hidden');
                    
                    // Show Passenger on Driver's Map
                    if(markers['passenger']) map.removeLayer(markers['passenger']);
                    markers['passenger'] = L.circle([req.pLat, req.pLng], {radius: 50, color: 'emerald'}).addTo(map);
                    map.flyTo([req.pLat, req.pLng], 17);
                }
            });
        }

        window.acceptRide = () => {
            alert("Trip started!");
            document.getElementById('pop-request').classList.add('hidden');
        };

        window.closePop = () => document.getElementById('pop-request').classList.add('hidden');
        window.togglePlate = () => document.getElementById('setup-plate').classList.toggle('hidden', document.getElementById('setup-role').value !== 'driver');
    </script>
</body>
</html>
