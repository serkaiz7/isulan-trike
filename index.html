<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - Pro Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; }
        #map { height: 45vh; width: 100%; z-index: 1; background: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); }
        .marker-pin { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; background: #10b981; position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -15px 0 0 -15px; border: 3px solid white; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-center text-white">
        <div class="text-center mb-10">
            <i class="fa-solid fa-motorcycle text-6xl mb-4"></i>
            <h1 class="text-4xl font-black italic">IsulanTrike</h1>
        </div>
        <div class="space-y-4 max-w-xs mx-auto w-full">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white placeholder-white/60 font-bold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white placeholder-white/60 font-bold">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-emerald-600 rounded-2xl font-black shadow-lg">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-4 bg-emerald-800 text-white border border-emerald-400 rounded-2xl font-black">Register</button>
        </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 z-[9000] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-8 text-white text-center">
                <h3 class="text-2xl font-black uppercase">24H Duty Pass</h3>
                <p class="text-4xl font-black mt-2">₱20.00</p>
            </div>
            <div class="p-8 space-y-4">
                <p class="text-gray-500 text-sm text-center font-bold">Pay via GCash to start accepting passengers.</p>
                <button id="pay-btn" onclick="payWithGCash()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">OPEN GCASH</button>
                <button onclick="document.getElementById('payment-modal').classList.add('hidden')" class="w-full text-gray-400 font-bold text-xs uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>
        
        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-2xl p-6 overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <div id="driver-panel" class="hidden">
                <div id="booking-request" class="hidden mb-4 p-5 bg-amber-50 border-2 border-amber-200 rounded-3xl animate-pulse">
                    <p class="text-xs font-black text-amber-600 uppercase mb-1">New Ride Request!</p>
                    <h4 id="req-name" class="text-xl font-black text-gray-800">Passenger</h4>
                    <p id="req-dest" class="text-sm font-bold text-gray-500 mb-4 italic">Destination...</p>
                    <div class="flex gap-2">
                        <button onclick="respondToBooking(true)" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-black">ACCEPT</button>
                        <button onclick="respondToBooking(false)" class="flex-1 py-3 bg-gray-200 text-gray-600 rounded-xl font-black">DECLINE</button>
                    </div>
                </div>
                <button id="duty-btn" onclick="toggleDuty()" class="w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl">GO ONLINE</button>
            </div>

            <div id="passenger-panel" class="hidden">
                <input id="dest-input" type="text" placeholder="Where to?" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold mb-4">
                <div id="driver-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = `artifacts/isulan-trike/users`;

        let userUid, userData, map, markers = {};

        // 1. AUTH & GPS FIX
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userUid = u.uid;
                const snap = await getDoc(doc(db, COLL, userUid));
                userData = snap.data();
                initMap();
                startTracking();
                listenToData();
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').classList.replace('hidden', 'flex');
                document.getElementById(userData.role + '-panel').classList.remove('hidden');
            }
        });

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const { latitude, longitude } = p.coords;
                updateDoc(doc(db, COLL, userUid), { lat: latitude, lng: longitude });
                map.panTo([latitude, longitude]);
            }, null, { enableHighAccuracy: true });
        }

        // 2. REAL-TIME DATA & MARKER SYNC
        function listenToData() {
            onSnapshot(collection(db, COLL), (snap) => {
                const list = document.getElementById('driver-list');
                if (userData.role === 'passenger') list.innerHTML = '';

                snap.forEach(d => {
                    const data = d.data();
                    const id = d.id;

                    // Update UI for the current user (if driver)
                    if (id === userUid) {
                        userData = data;
                        if (data.role === 'driver' && data.request) {
                            showBookingUI(data.request);
                        } else {
                            document.getElementById('booking-request').classList.add('hidden');
                        }
                        return;
                    }

                    // Update Map Markers
                    if (data.lat && data.lng && (data.isOnline || data.role === 'passenger')) {
                        if (!markers[id]) {
                            markers[id] = L.marker([data.lat, data.lng]).addTo(map);
                        } else {
                            markers[id].setLatLng([data.lat, data.lng]);
                        }
                    } else if (markers[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }

                    // List Online Drivers for Passenger
                    if (userData.role === 'passenger' && data.role === 'driver' && data.isOnline) {
                        renderDriverCard(id, data);
                    }
                });
            });
        }

        // 3. BOOKING LOGIC FIX
        window.bookDriver = async (driverId) => {
            const dest = document.getElementById('dest-input').value;
            if (!dest) return alert("Enter destination first!");
            
            await updateDoc(doc(db, COLL, driverId), {
                request: { passengerId: userUid, passengerName: userData.name, destination: dest }
            });
            alert("Request sent! Wait for driver to accept.");
        };

        function showBookingUI(req) {
            document.getElementById('booking-request').classList.remove('hidden');
            document.getElementById('req-name').innerText = req.passengerName;
            document.getElementById('req-dest').innerText = "To: " + req.destination;
        }

        window.respondToBooking = async (accept) => {
            if (accept) {
                alert("Trip started! Follow the map.");
                // Here you would add trip tracking logic
            }
            await updateDoc(doc(db, COLL, userUid), { request: deleteField() });
        }

        // 4. GCASH PAYMENT (PAYMONGO INTEGRATION)
        window.payWithGCash = async () => {
            const btn = document.getElementById('pay-btn');
            btn.innerText = "LINKING GCASH...";
            
            try {
                // In Production, move this to a Backend Cloud Function for security
                const response = await fetch('https://api.paymongo.com/v1/checkout_sessions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('pk_test_aF6Vgh9tFELsQXHQWnsFwFME') 
                    },
                    body: JSON.stringify({
                        data: {
                            attributes: {
                                send_email_receipt: false,
                                show_description: true,
                                payment_method_types: ['gcash'],
                                line_items: [{ currency: 'PHP', amount: 2000, name: '24H Driver Duty Pass', quantity: 1 }],
                                success_url: window.location.href
                            }
                        }
                    })
                });
                const session = await response.json();
                window.location.href = session.data.attributes.checkout_url;
            } catch (e) {
                alert("Payment Error: " + e.message);
            }
        };

        window.toggleDuty = () => {
            const now = Date.now();
            if (!userData.subscriptionExpiry || now > userData.subscriptionExpiry) {
                document.getElementById('payment-modal').classList.remove('hidden');
            } else {
                const s = !userData.isOnline;
                updateDoc(doc(db, COLL, userUid), { isOnline: s });
                document.getElementById('duty-btn').innerText = s ? "GO OFFLINE" : "GO ONLINE";
                document.getElementById('duty-btn').className = s ? "w-full py-12 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl" : "w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            }
        };

        function renderDriverCard(id, data) {
            document.getElementById('driver-list').innerHTML += `
                <div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm">
                    <p class="font-black text-gray-800">${data.name}</p>
                    <button onclick="bookDriver('${id}')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-black">BOOK NOW</button>
                </div>`;
        }
    </script>
</body>
</html>
