<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 35vh; width: 100%; z-index: 1; transition: 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .star-rating i { cursor: pointer; transition: 0.2s; }
        .star-rating i.active { color: #facc15; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <!-- 1. AUTH & SETUP (Same as before but hidden after login) -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
            <p class="opacity-80 font-medium">Premium Real-time Transport</p>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-5 bg-emerald-700 text-white border-2 border-emerald-500 rounded-2xl font-black">Register</button>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <!-- Header Panel -->
        <div class="absolute top-4 left-4 right-4 z-[1000] glass p-3 rounded-2xl flex justify-between items-center shadow-lg border border-white/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <p id="user-display" class="font-black text-sm text-gray-800">User</p>
                    <p id="role-display" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Role</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="showDashboard()" class="p-3 text-emerald-600 bg-emerald-50 rounded-xl"><i class="fa-solid fa-chart-pie"></i></button>
                <button onclick="logout()" class="p-3 text-red-500 bg-red-50 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <!-- Passenger Dashboard -->
            <div id="passenger-panel" class="hidden">
                <div id="p-status-box" class="hidden mb-6 p-5 rounded-3xl animate-pop bg-blue-600 text-white shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <p class="text-[10px] font-black uppercase opacity-70">On Trip</p>
                        <button onclick="cancelBooking()" class="text-[10px] bg-white/20 px-2 py-1 rounded-lg">Cancel</button>
                    </div>
                    <p id="p-status-text" class="text-lg font-black italic">Connecting...</p>
                </div>
                <div class="mb-6 relative">
                    <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input id="dest-input" type="text" placeholder="Where are you going?" class="w-full p-5 pl-12 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500">
                </div>
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <!-- Driver Dashboard -->
            <div id="driver-panel" class="hidden">
                <div id="d-active-box" class="hidden w-full p-6 bg-emerald-50 border-2 border-emerald-200 rounded-[2.5rem] mb-6 text-center animate-pop">
                    <p class="text-xs font-black text-emerald-600 uppercase mb-2">Current Passenger</p>
                    <h2 id="current-p-name" class="text-2xl font-black mb-1">...</h2>
                    <p id="current-p-dest" class="text-sm font-bold text-gray-500 italic mb-6">...</p>
                    <button onclick="completeTrip()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">MARK AS ARRIVED</button>
                </div>
                <div id="driver-offline-ui">
                    <button id="duty-btn" onclick="toggleDuty()" class="w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl">GO ONLINE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. RATING MODAL -->
    <div id="rating-modal" class="hidden fixed inset-0 z-[7000] bg-black/80 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center animate-pop">
            <h3 class="text-2xl font-black italic mb-2">You've Arrived!</h3>
            <p class="text-gray-500 font-bold mb-6">Rate your driver</p>
            <div class="star-rating flex justify-center gap-3 mb-8 text-4xl text-gray-200">
                <i class="fa-solid fa-star" onclick="setRating(1)"></i>
                <i class="fa-solid fa-star" onclick="setRating(2)"></i>
                <i class="fa-solid fa-star" onclick="setRating(3)"></i>
                <i class="fa-solid fa-star" onclick="setRating(4)"></i>
                <i class="fa-solid fa-star" onclick="setRating(5)"></i>
            </div>
            <button onclick="submitRating()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black">SUBMIT REVIEW</button>
        </div>
    </div>

    <!-- 4. STATS DASHBOARD OVERLAY -->
    <div id="dashboard-overlay" class="hidden fixed inset-0 z-[6500] bg-white p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black italic">Dashboard</h2>
            <button onclick="closeDashboard()" class="text-gray-400 text-2xl"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-6 bg-emerald-50 rounded-3xl">
                <p class="text-[10px] font-black text-emerald-600 uppercase mb-1">Total Trips</p>
                <p id="stat-trips" class="text-3xl font-black">0</p>
            </div>
            <div class="p-6 bg-amber-50 rounded-3xl">
                <p class="text-[10px] font-black text-amber-600 uppercase mb-1">Rating</p>
                <p id="stat-rating" class="text-3xl font-black">5.0</p>
            </div>
        </div>
        <button onclick="logout()" class="w-full py-5 bg-red-50 text-red-600 rounded-2xl font-black flex items-center justify-center gap-2">
            <i class="fa-solid fa-power-off"></i> Logout
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL_PATH = `artifacts/isulan-trike-2026/public/data/users`;

        let userUid, userData, map, userMarker, currentRating = 0, lastDriverId = null;

        // AUTH
        window.handleAuth = async (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
                else await createUserWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        window.logout = async () => {
            if(userData.role === 'driver') await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: false });
            await signOut(auth);
            location.reload();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL_PATH, userUid));
                if(snap.exists()) { userData = snap.data(); launchApp(); }
            } else { document.getElementById('auth-screen').classList.remove('hidden'); }
        });

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('role-display').innerText = userData.role;
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    updateMyPosition(latitude, longitude);
                }, null, { enableHighAccuracy: true });
            }

            listenForUpdates();
        }

        async function updateMyPosition(lat, lng) {
            if(!userMarker) userMarker = L.circleMarker([lat, lng], { radius: 8, color: '#fff', fillColor: '#10b981', fillOpacity: 1, weight: 3 }).addTo(map);
            else userMarker.setLatLng([lat, lng]);
            await updateDoc(doc(db, COLL_PATH, userUid), { lat, lng });
        }

        function listenForUpdates() {
            onSnapshot(collection(db, COLL_PATH), snap => {
                if(userData.role === 'passenger') document.getElementById('driver-list').innerHTML = '';
                snap.forEach(dDoc => {
                    const data = dDoc.data();
                    if(dDoc.id === userUid) {
                        userData = data; 
                        handleInternalLogic(data);
                        return;
                    }
                    if(userData.role === 'passenger' && data.role === 'driver' && data.isOnline) renderDriverCard(dDoc.id, data);
                    // If Passenger: Detect if Driver marked "Arrived"
                    if(userData.role === 'passenger' && data.lastFinishedTrip?.pId === userUid) {
                        lastDriverId = dDoc.id;
                        document.getElementById('rating-modal').classList.remove('hidden');
                    }
                });
            });
        }

        function handleInternalLogic(data) {
            if(userData.role === 'driver' && data.request?.status === 'accepted') {
                document.getElementById('driver-offline-ui').classList.add('hidden');
                document.getElementById('d-active-box').classList.remove('hidden');
                document.getElementById('current-p-name').innerText = data.request.pName;
                document.getElementById('current-p-dest').innerText = data.request.dest;
            }
        }

        // RATING SYSTEM
        window.setRating = (val) => {
            currentRating = val;
            const stars = document.querySelectorAll('.star-rating i');
            stars.forEach((s, i) => s.className = i < val ? 'fa-solid fa-star active' : 'fa-solid fa-star');
        };

        window.submitRating = async () => {
            if(currentRating === 0) return alert("Select stars!");
            await updateDoc(doc(db, COLL_PATH, lastDriverId), {
                totalRating: increment(currentRating),
                tripCount: increment(1)
            });
            document.getElementById('rating-modal').classList.add('hidden');
            location.reload();
        };

        window.completeTrip = async () => {
            const req = userData.request;
            await updateDoc(doc(db, COLL_PATH, userUid), {
                lastFinishedTrip: { ...req, time: Date.now() },
                request: deleteField(),
                tripCount: increment(1)
            });
            document.getElementById('d-active-box').classList.add('hidden');
            document.getElementById('driver-offline-ui').classList.remove('hidden');
        };

        // UI HELPERS
        window.showDashboard = () => {
            document.getElementById('stat-trips').innerText = userData.tripCount || 0;
            const avg = userData.totalRating ? (userData.totalRating / userData.tripCount).toFixed(1) : "5.0";
            document.getElementById('stat-rating').innerText = avg;
            document.getElementById('dashboard-overlay').classList.remove('hidden');
        };
        window.closeDashboard = () => document.getElementById('dashboard-overlay').classList.add('hidden');

        window.toggleDuty = async () => {
            userData.isOnline = !userData.isOnline;
            const btn = document.getElementById('duty-btn');
            btn.innerText = userData.isOnline ? "GO OFFLINE" : "GO ONLINE";
            btn.className = userData.isOnline ? "w-full py-8 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl shadow-lg" : "w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: userData.isOnline });
        };

        function renderDriverCard(id, data) {
            const avg = data.totalRating ? (data.totalRating / data.tripCount).toFixed(1) : "5.0";
            document.getElementById('driver-list').innerHTML += `
                <div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
                        <div>
                            <p class="font-black text-gray-800 text-sm">${data.name} <span class="text-amber-400 ml-1"><i class="fa-solid fa-star"></i> ${avg}</span></p>
                            <p class="text-[10px] text-gray-400 font-bold">${data.plate}</p>
                        </div>
                    </div>
                    <button onclick="bookDriver('${id}')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black">BOOK</button>
                </div>`;
        }

        window.bookDriver = async (dId) => {
            const dest = document.getElementById('dest-input').value;
            if(!dest) return alert("Enter destination");
            await updateDoc(doc(db, COLL_PATH, dId), { request: { pId: userUid, pName: userData.name, dest, status: 'pending' } });
            document.getElementById('p-status-box').classList.remove('hidden');
            document.getElementById('p-status-text').innerText = "Waiting for Driver...";
        };
    </script>
</body>
</html>
