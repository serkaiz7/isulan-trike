<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 45vh; width: 100%; z-index: 1; transition: height 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .marker-label { background: white; border-radius: 6px; padding: 2px 6px; font-size: 10px; font-weight: 800; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #eee; white-space: nowrap; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .dash-card { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <!-- 1. AUTH & SETUP (Same as previous for security) -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold text-white">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold text-white">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('anon')" class="w-full py-5 bg-emerald-900/40 text-white rounded-2xl font-bold italic">Guest Access</button>
            <button onclick="handleAuth('register')" class="w-full py-2 text-white/70 font-bold text-sm underline">Create New Account</button>
        </div>
    </div>

    <!-- 2. MAIN APP UI -->
    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <!-- Dashboard Toggle Button -->
        <div class="absolute top-4 left-4 z-[1000]">
            <button onclick="toggleDashboard()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-emerald-600 shadow-lg border border-white/50 active:scale-90 transition-all">
                <i class="fa-solid fa-chart-pie text-xl"></i>
            </button>
        </div>

        <button onclick="location.reload()" class="absolute top-4 right-4 z-[1000] w-12 h-12 glass rounded-2xl text-red-500 shadow-lg border border-white/50">
            <i class="fa-solid fa-power-off"></i>
        </button>

        <!-- Dynamic Content Area -->
        <div id="bottom-sheet" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto transition-all duration-500">
            
            <!-- DASHBOARD PANEL (Hidden by default) -->
            <div id="dashboard-panel" class="hidden animate-pop mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-gray-800 italic">User Dashboard</h2>
                    <button onclick="toggleDashboard()" class="text-gray-400 text-sm font-bold uppercase tracking-widest">Close</button>
                </div>

                <!-- Driver Stats -->
                <div id="driver-stats" class="hidden grid grid-cols-2 gap-4 mb-6">
                    <div class="dash-card p-5 rounded-[2rem]">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Total Earned</p>
                        <p id="stat-earnings" class="text-2xl font-black text-emerald-600">₱0.00</p>
                    </div>
                    <div class="dash-card p-5 rounded-[2rem]">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Rating</p>
                        <p id="stat-rating" class="text-2xl font-black text-gray-800">★5.0</p>
                    </div>
                </div>

                <!-- Passenger Stats -->
                <div id="passenger-stats" class="hidden dash-card p-6 rounded-[2rem] mb-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Loyalty Status</p>
                            <p class="text-xl font-black text-blue-600">Elite Passenger</p>
                        </div>
                        <i class="fa-solid fa-award text-3xl text-yellow-400"></i>
                    </div>
                </div>

                <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-3">Recent Activity</p>
                    <div id="activity-log" class="space-y-3 text-xs font-bold text-gray-600">
                        <p class="italic opacity-50">No recent rides found.</p>
                    </div>
                </div>
            </div>

            <!-- MAIN OPERATIONAL PANELS -->
            <div id="main-ops">
                <!-- Passenger Panel -->
                <div id="passenger-panel" class="hidden">
                    <input id="dest-input" type="text" placeholder="Where to in Isulan?" class="w-full p-5 bg-gray-100 rounded-2xl mb-6 outline-none font-bold border-2 border-transparent focus:border-emerald-500 shadow-inner">
                    <h3 class="font-black text-gray-800 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        Drivers Online
                    </h3>
                    <div id="driver-list" class="space-y-3"></div>
                </div>

                <!-- Driver Panel -->
                <div id="driver-panel" class="hidden h-full flex flex-col items-center justify-center py-10">
                    <div id="driver-offline-ui">
                        <button id="duty-btn" onclick="toggleDuty()" class="w-full py-10 px-16 bg-gray-100 text-gray-400 rounded-[3rem] font-black text-3xl transition-all shadow-xl border-4 border-white">GO ONLINE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. BOOKING ALERT & RATING MODAL (Omitted for brevity, use previous code) -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = "isulan_elite_v7";

        let userUid, userData, map;

        // DASHBOARD TOGGLE
        window.toggleDashboard = () => {
            const dash = document.getElementById('dashboard-panel');
            const ops = document.getElementById('main-ops');
            const mapEl = document.getElementById('map');
            
            if(dash.classList.contains('hidden')) {
                dash.classList.remove('hidden');
                ops.classList.add('hidden');
                mapEl.style.height = "20vh"; // Shrink map for dashboard
                updateDashboardStats();
            } else {
                dash.classList.add('hidden');
                ops.classList.remove('hidden');
                mapEl.style.height = "45vh";
            }
        };

        function updateDashboardStats() {
            if(userData.role === 'driver') {
                document.getElementById('driver-stats').classList.remove('hidden');
                document.getElementById('stat-earnings').innerText = `₱${(userData.totalRides || 0) * 21}.00`;
                document.getElementById('stat-rating').innerText = `★${(userData.rating || 5).toFixed(1)}`;
            } else {
                document.getElementById('passenger-stats').classList.remove('hidden');
            }
        }

        // AUTH & APP START
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL, userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    startApp();
                } else {
                    // Logic to handle new user setup or guest
                    userData = { uid: userUid, name: "Kaiser", role: "passenger", totalRides: 0, rating: 5, isOnline: false };
                    await setDoc(doc(db, COLL, userUid), userData);
                    startApp();
                }
            }
        });

        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            // Listen for changes to current user data for live dashboard updates
            onSnapshot(doc(db, COLL, userUid), snap => {
                userData = snap.data();
            });

            if(userData.role === 'passenger') listenForDrivers();
        }

        function listenForDrivers() {
            onSnapshot(collection(db, COLL), snap => {
                const list = document.getElementById('driver-list');
                list.innerHTML = '';
                snap.forEach(dDoc => {
                    const d = dDoc.data();
                    if(d.role === 'driver' && d.isOnline) {
                        list.innerHTML += `
                            <div class="p-5 dash-card rounded-3xl flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
                                    <div><p class="font-black text-gray-800">${d.name}</p><p class="text-[9px] font-bold text-gray-400">★${d.rating.toFixed(1)}</p></div>
                                </div>
                                <button class="px-4 py-2 bg-emerald-600 text-white rounded-xl text-xs font-black">HIRE</button>
                            </div>`;
                    }
                });
            });
        }

        window.toggleDuty = async () => {
            userData.isOnline = !userData.isOnline;
            const btn = document.getElementById('duty-btn');
            btn.innerText = userData.isOnline ? "OFFLINE" : "GO ONLINE";
            btn.className = userData.isOnline ? 
                "w-full py-10 px-16 bg-emerald-600 text-white rounded-[3rem] font-black text-3xl shadow-xl shadow-emerald-100 border-4 border-emerald-500" : 
                "w-full py-10 px-16 bg-gray-100 text-gray-400 rounded-[3rem] font-black text-3xl border-4 border-white";
            await updateDoc(doc(db, COLL, userUid), { isOnline: userData.isOnline });
        };

        window.handleAuth = async (type) => { /* Reuse logic from previous response */ };
    </script>
</body>
</html>
