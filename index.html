<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakai - Elite Transportation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; }
        #map { height: 50vh; width: 100%; z-index: 1; background: #e2e8f0; transition: all 0.5s ease; }
        .marquee-container { background: #064e3b; color: #fbbf24; overflow: hidden; white-space: nowrap; padding: 4px 0; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid #059669; position: relative; z-index: 2000; }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .driver-marker-icon { color: #10b981; font-size: 24px; text-shadow: 0 0 10px white; display: flex; justify-content: center; align-items: center; }
        .passenger-marker-icon { color: #3b82f6; font-size: 20px; text-shadow: 0 0 10px white; display: flex; justify-content: center; align-items: center; }
        .glow-text { text-shadow: 0 0 15px rgba(16, 185, 129, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .nav-btn.active { color: #10b981; }
        .role-card.active { border-color: #fbbf24; background: rgba(251, 191, 36, 0.2); transform: scale(1.05); }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

    <div class="marquee-container">
        <div class="marquee-content">THANK YOU FOR CHOOSING SAKAI • ENJOY A SAFE AND COMFORTABLE RIDE • LOWEST RATES IN ISULAN • SAKAI: THE FUTURE OF LOCAL TRANSPORT • </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[9000] bg-emerald-600 flex flex-col p-6 overflow-y-auto justify-center text-white">
        <div class="text-center mb-6">
            <i class="fa-solid fa-motorcycle text-5xl mb-2"></i>
            <h1 class="text-4xl font-black italic tracking-tighter">Sakai</h1>
        </div>
        <div id="auth-forms" class="space-y-4 max-w-xs mx-auto w-full">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white font-bold placeholder-white/50">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white font-bold placeholder-white/50">
            
            <div id="login-actions" class="space-y-3">
                <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-emerald-600 rounded-2xl font-black shadow-lg">Sign In</button>
                <button onclick="showRegisterUI()" class="w-full py-4 bg-emerald-800 text-white border border-emerald-400 rounded-2xl font-black">Create Account</button>
            </div>

            <div id="reg-ui" class="hidden space-y-4 pt-4 border-t border-white/20">
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="selectRole('passenger')" id="role-p" class="role-card p-4 border-2 border-white/30 rounded-2xl text-center cursor-pointer">
                        <i class="fa-solid fa-person-walking text-2xl mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Passenger</p>
                    </div>
                    <div onclick="selectRole('driver')" id="role-d" class="role-card p-4 border-2 border-white/30 rounded-2xl text-center cursor-pointer">
                        <i class="fa-solid fa-motorcycle text-2xl mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Driver</p>
                    </div>
                </div>
                <input id="reg-alias" type="text" placeholder="Alias Name" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white font-bold">
                <div id="driver-fields" class="hidden space-y-4">
                    <input id="reg-mtop" type="text" placeholder="MTOP" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white font-bold">
                    <input id="reg-plate" type="text" placeholder="Plate" class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl outline-none text-white font-bold">
                </div>
                <div class="space-y-3">
                    <button onclick="handleAuth('register')" class="w-full py-4 bg-amber-400 text-emerald-900 rounded-2xl font-black shadow-lg">Complete Registration</button>
                    <button onclick="showLoginUI()" class="w-full py-3 bg-transparent text-white/70 rounded-2xl font-bold text-sm">
                        <i class="fa-solid fa-arrow-left mr-2"></i>Back to Login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div id="alert-popup" class="hidden fixed inset-x-6 top-20 z-[8500] bg-white rounded-[2rem] p-6 shadow-2xl border-2 transition-all duration-300">
            <div class="flex items-center gap-4">
                <div id="alert-icon-bg" class="p-3 rounded-full"><i id="alert-icon" class="fa-solid text-xl"></i></div>
                <div>
                    <h5 id="alert-title" class="font-black text-gray-800 uppercase text-sm"></h5>
                    <p id="alert-body" class="text-xs font-bold text-gray-500"></p>
                </div>
            </div>
        </div>

        <div id="status-overlay" class="hidden h-[50vh] bg-emerald-900 flex flex-col items-center justify-center text-white text-center p-8 z-[2000]">
            <h2 class="text-2xl font-black glow-text uppercase italic mb-2">Ride in Progress</h2>
            <p class="text-[10px] font-bold tracking-widest uppercase opacity-70">Fare: ₱21.00</p>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-2xl p-6 overflow-y-auto pb-28">
            <div id="driver-panel" class="hidden">
                <div id="trip-card" class="hidden mb-6 p-6 bg-emerald-50 border-2 border-emerald-100 rounded-[2.5rem]">
                    <h4 id="trip-p-name" class="text-xl font-black text-gray-800">...</h4>
                    <p id="trip-p-dest" class="text-sm font-bold text-gray-500 mb-6 italic">...</p>
                    <div id="driver-actions" class="flex gap-2"></div>
                </div>
                <button id="duty-btn" onclick="toggleDuty()" class="w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl uppercase tracking-tighter">Go Online</button>
            </div>

            <div id="passenger-panel" class="hidden">
                <div id="p-waiting-card" class="hidden mb-6 p-6 bg-blue-50 border-2 border-blue-100 rounded-[2.5rem] text-center">
                    <p id="wait-driver-name" class="font-black text-xl mb-4">Searching...</p>
                    <button onclick="cancelTrip()" class="px-6 py-2 bg-red-100 text-red-600 rounded-full text-xs font-black uppercase">Cancel</button>
                </div>
                <input id="dest-input" type="text" placeholder="Where to? (Min ₱21)" class="w-full p-5 bg-gray-50 rounded-3xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold mb-4">
                <div id="driver-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 p-4 flex justify-around items-center z-[7000]">
            <button onclick="toggleDashboard(false)" class="nav-btn active"><i class="fa-solid fa-map-location-dot text-xl mb-1"></i>Map</button>
            <button id="nav-dash" onclick="toggleDashboard(true)" class="nav-btn hidden"><i class="fa-solid fa-chart-pie text-xl mb-1"></i>Hub</button>
            <button onclick="logout()" class="nav-btn text-red-400"><i class="fa-solid fa-power-off text-xl mb-1"></i>Logout</button>
        </div>
    </div>

    <div id="driver-dashboard" class="hidden fixed inset-0 z-[8000] bg-slate-50 overflow-y-auto p-6 pb-32">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black text-gray-800 italic">Sakai Hub</h2>
            <button onclick="toggleDashboard(false)" class="w-10 h-10 bg-white shadow rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-emerald-600 p-5 rounded-[2rem] text-white shadow-lg"><p class="text-[10px] font-bold opacity-80 uppercase mb-1">Income</p><h3 class="text-2xl font-black">₱<span id="stat-income">0</span></h3></div>
            <div class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm"><p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Trips</p><h3 class="text-2xl font-black text-gray-800" id="stat-trips">0</h3></div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm space-y-4">
            <h4 class="font-black text-gray-800 mb-2">Driver Profile Details</h4>
            
            <div class="space-y-1">
                <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">Alias Name</label>
                <input id="edit-name" type="text" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">Mobile Number (Optional)</label>
                <input id="edit-phone" type="tel" placeholder="0912..." class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">Messenger Link (Optional)</label>
                <input id="edit-messenger" type="text" placeholder="m.me/yourname" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">Home Address (Optional)</label>
                <input id="edit-address" type="text" placeholder="Barangay, Street" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">MTOP</label>
                    <input id="edit-mtop" type="text" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-extrabold uppercase text-gray-400 ml-2">Plate No.</label>
                    <input id="edit-plate" type="text" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-0 focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <button onclick="updateProfile()" class="w-full py-4 bg-gray-800 text-white rounded-2xl font-black mt-4 shadow-xl active:scale-95 transition-transform">Update Information</button>
        </div>
    </div>

    <div id="rating-modal" class="hidden fixed inset-0 z-[8500] bg-black/80 backdrop-blur-md flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8">
            <h3 class="text-2xl font-black mb-2 italic">Arrived!</h3>
            <div class="flex justify-center gap-2 mb-8 text-3xl text-amber-400" id="star-box">
                <i class="fa-solid fa-star" onclick="setStar(1)"></i><i class="fa-solid fa-star" onclick="setStar(2)"></i><i class="fa-solid fa-star" onclick="setStar(3)"></i><i class="fa-solid fa-star" onclick="setStar(4)"></i><i class="fa-solid fa-star" onclick="setStar(5)"></i>
            </div>
            <button onclick="finishTrip()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">DONE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
            authDomain: "isulantrike.firebaseapp.com",
            projectId: "isulantrike",
            storageBucket: "isulantrike.firebasestorage.app",
            messagingSenderId: "262164007490",
            appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
            measurementId: "G-3K2TEVV4X5" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = "users";

        let userUid, userData, map, markers = {}, currentRating = 5, lastTripState = null, selectedRole = null, routingControl = null;

        window.showAlert = (title, body, type = 'success') => {
            const el = document.getElementById('alert-popup');
            const iconBg = document.getElementById('alert-icon-bg');
            const icon = document.getElementById('alert-icon');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-body').innerText = body;
            if (type === 'success') {
                el.style.borderColor = '#10b981';
                iconBg.className = "p-3 rounded-full bg-emerald-100 text-emerald-600";
                icon.className = "fa-solid fa-check-circle text-xl";
            } else {
                el.style.borderColor = '#ef4444';
                iconBg.className = "p-3 rounded-full bg-red-100 text-red-600";
                icon.className = "fa-solid fa-circle-xmark text-xl";
            }
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        };

        window.showRegisterUI = () => { 
            document.getElementById('login-actions').classList.add('hidden'); 
            document.getElementById('reg-ui').classList.remove('hidden'); 
        };

        window.showLoginUI = () => {
            document.getElementById('login-actions').classList.remove('hidden'); 
            document.getElementById('reg-ui').classList.add('hidden');
            selectedRole = null;
            document.getElementById('role-p').classList.remove('active');
            document.getElementById('role-d').classList.remove('active');
            document.getElementById('driver-fields').classList.add('hidden');
        };

        window.selectRole = (role) => { 
            selectedRole = role; 
            document.getElementById('role-p').className = role === 'passenger' ? 'role-card active p-4 border-2 rounded-2xl text-center cursor-pointer' : 'role-card p-4 border-2 border-white/30 rounded-2xl text-center cursor-pointer'; 
            document.getElementById('role-d').className = role === 'driver' ? 'role-card active p-4 border-2 rounded-2xl text-center cursor-pointer' : 'role-card p-4 border-2 border-white/30 rounded-2xl text-center cursor-pointer'; 
            document.getElementById('driver-fields').classList.toggle('hidden', role !== 'driver'); 
        };

        window.handleAuth = async (t) => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(!e || !p) return alert("Please fill in email and password.");
            
            try {
                if(t === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const alias = document.getElementById('reg-alias').value;
                    if(!selectedRole) return alert("Please select a role.");
                    if(!alias) return alert("Please enter an alias.");
                    
                    const cred = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, COLL, cred.user.uid), { 
                        name: alias, 
                        role: selectedRole, 
                        isOnline: false, 
                        lat: 6.6294, 
                        lng: 124.605, 
                        income: 0, 
                        tripCount: 0, 
                        totalRating: 0,
                        plate: document.getElementById('reg-plate').value || "", 
                        mtop: document.getElementById('reg-mtop').value || "",
                        phone: "",
                        messenger: "",
                        address: "",
                        lastActive: Date.now() 
                    });
                }
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) { 
                userUid = u.uid; 
                const snap = await getDoc(doc(db, COLL, userUid)); 
                if (snap.exists()) { 
                    userData = snap.data(); 
                    initApp(); 
                } else signOut(auth); 
            }
            else { 
                document.getElementById('auth-screen').classList.remove('hidden'); 
                document.getElementById('app-ui').classList.add('hidden'); 
            }
        });

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            if(userData.role === 'driver') document.getElementById('nav-dash').classList.remove('hidden');
            if(!map) {
                map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 16);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            navigator.geolocation.watchPosition(p => { if(userUid) updateDoc(doc(db, COLL, userUid), { lat: p.coords.latitude, lng: p.coords.longitude, lastActive: Date.now() }); }, null, { enableHighAccuracy: true });
            syncData();
        }

        function syncData() {
            onSnapshot(collection(db, COLL), (snap) => {
                const now = Date.now();
                const dList = document.getElementById('driver-list');
                if(userData.role === 'passenger') dList.innerHTML = '';
                let otherPartyData = null;

                snap.forEach(d => {
                    const data = d.data(), id = d.id;
                    if(id === userUid) {
                        if (userData.role === 'driver' && userData.activeTrip && !data.activeTrip && (lastTripState === 'requested' || lastTripState === 'accepted')) {
                             showAlert("Trip Cancelled", "error");
                        }
                        userData = data;
                        lastTripState = userData.activeTrip ? userData.activeTrip.status : null;
                        handleStatusLogic();
                        if(userData.role === 'driver') { 
                            document.getElementById('stat-income').innerText = userData.income || 0; 
                            document.getElementById('stat-trips').innerText = userData.tripCount || 0; 
                        }
                    }

                    if (userData.activeTrip && (id === userData.activeTrip.dId || id === userData.activeTrip.pId) && id !== userUid) otherPartyData = data;

                    const isFresh = data.lastActive && (now - data.lastActive < 120000);
                    if(isFresh && data.lat && data.lng && (data.isOnline || data.role === 'passenger' || (userData.activeTrip && (id === userData.activeTrip.dId || id === userData.activeTrip.pId)))) {
                        if(markers[id]) markers[id].setLatLng([data.lat, data.lng]);
                        else markers[id] = L.marker([data.lat, data.lng], { icon: L.divIcon({ className: '', html: data.role === 'driver' ? `<div class="driver-marker-icon"><i class="fa-solid fa-motorcycle"></i></div>` : `<div class="passenger-marker-icon"><i class="fa-solid fa-person-walking"></i></div>`, iconSize: [30, 30] }) }).addTo(map);
                    } else if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }

                    if(userData.role === 'passenger' && data.role === 'driver' && data.isOnline && isFresh && !data.activeTrip) {
                        const avg = data.tripCount > 0 ? (data.totalRating / data.tripCount).toFixed(1) : "5.0";
                        dList.innerHTML += `<div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm"><div><p class="font-black text-gray-800 text-sm">${data.name}</p><p class="text-[10px] font-bold text-amber-500 uppercase"><i class="fa-solid fa-star"></i> ${avg} | MTOP: ${data.mtop || 'N/A'}</p></div><button onclick="bookDriver('${id}')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black">BOOK</button></div>`;
                    }
                });

                if (userData.activeTrip && (userData.activeTrip.status === 'accepted' || userData.activeTrip.status === 'pickedup')) {
                    if (otherPartyData && userData.lat && otherPartyData.lat) {
                        const myLoc = L.latLng(userData.lat, userData.lng), theirLoc = L.latLng(otherPartyData.lat, otherPartyData.lng);
                        if (!routingControl) routingControl = L.Routing.control({ waypoints: [myLoc, theirLoc], lineOptions: { styles: [{ color: '#10b981', weight: 6, opacity: 0.8 }] }, createMarker: () => null, addWaypoints: false }).addTo(map);
                        else routingControl.setWaypoints([myLoc, theirLoc]);
                    }
                } else if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            });
        }

        async function handleStatusLogic() {
            const overlay = document.getElementById('status-overlay'), tripCard = document.getElementById('trip-card'), pWait = document.getElementById('p-waiting-card'), dActions = document.getElementById('driver-actions');
            overlay.classList.add('hidden'); tripCard.classList.add('hidden'); pWait.classList.add('hidden');
            
            if (userData.activeTrip) {
                const t = userData.activeTrip;
                if (userData.role === 'passenger' && t.status === 'declined') {
                    showAlert("Driver is Busy", "The driver declined. Please try another Sakai.", "error");
                    await updateDoc(doc(db, COLL, userUid), { activeTrip: deleteField() });
                    return;
                }

                if (userData.role === 'driver') {
                    tripCard.classList.remove('hidden'); document.getElementById('trip-p-name').innerText = t.pName; document.getElementById('trip-p-dest').innerText = "To: " + t.dest;
                    if (t.status === 'requested') dActions.innerHTML = `<button onclick="updateStatus('accepted')" class="flex-1 py-4 bg-emerald-600 text-white rounded-xl font-black">ACCEPT</button><button onclick="updateStatus('declined')" class="flex-1 py-4 bg-red-100 text-red-600 rounded-xl font-black">DECLINE</button>`;
                    else if (t.status === 'accepted') dActions.innerHTML = `<button onclick="updateStatus('pickedup')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black">PICKUP</button>`;
                    else if (t.status === 'pickedup') dActions.innerHTML = `<button onclick="updateStatus('arrived')" class="w-full py-4 bg-orange-600 text-white rounded-xl font-black">ARRIVED</button>`;
                } else {
                    pWait.classList.remove('hidden');
                    if (t.status === 'requested') document.getElementById('wait-driver-name').innerText = "Requesting Sakai...";
                    else if (t.status === 'accepted') {
                        document.getElementById('wait-driver-name').innerText = "Driver " + t.dName + " is coming!";
                        if(lastTripState !== 'accepted') showAlert("Driver Accepted!", "Your Sakai is on the way.", "success");
                    }
                    else if (t.status === 'pickedup') overlay.classList.remove('hidden');
                    else if (t.status === 'arrived') document.getElementById('rating-modal').classList.remove('hidden');
                }
            }
        }

        window.updateStatus = async (s) => {
            const t = userData.activeTrip; if(!t) return;
            if(s === 'declined') {
                await updateDoc(doc(db, COLL, t.pId), { "activeTrip.status": "declined" });
                await updateDoc(doc(db, COLL, userUid), { activeTrip: deleteField() });
            } else if (s === 'arrived') {
                showAlert("Success", "Income recorded and trip completed.", "success");
                await updateDoc(doc(db, COLL, userUid), { "activeTrip.status": "arrived" });
                await updateDoc(doc(db, COLL, t.pId), { "activeTrip.status": "arrived" });
            } else {
                const up = { "activeTrip.status": s };
                await updateDoc(doc(db, COLL, userUid), up); await updateDoc(doc(db, COLL, t.pId), up); 
            }
        };

        window.bookDriver = async (dId) => {
            const dest = document.getElementById('dest-input').value; if(!dest) return alert("Enter destination.");
            const snap = await getDoc(doc(db, COLL, dId));
            const trip = { status: 'requested', pId: userUid, pName: userData.name, dId: dId, dName: snap.data().name, dest };
            await updateDoc(doc(db, COLL, dId), { activeTrip: trip }); await updateDoc(doc(db, COLL, userUid), { activeTrip: trip });
        };

        window.cancelTrip = async () => {
            const t = userData.activeTrip; if(!t || !confirm("Cancel ride?")) return;
            const targetId = userData.role === 'driver' ? t.pId : t.dId;
            await updateDoc(doc(db, COLL, userUid), { activeTrip: deleteField() }); if(targetId) await updateDoc(doc(db, COLL, targetId), { activeTrip: deleteField() });
        };

        window.finishTrip = async () => {
            const t = userData.activeTrip;
            await updateDoc(doc(db, COLL, t.dId), { activeTrip: deleteField(), income: increment(21), tripCount: increment(1), totalRating: increment(currentRating) });
            await updateDoc(doc(db, COLL, userUid), { activeTrip: deleteField() });
            document.getElementById('rating-modal').classList.add('hidden');
        };

        window.toggleDuty = () => { 
            const s = !userData.isOnline; 
            updateDoc(doc(db, COLL, userUid), { isOnline: s }); 
            const btn = document.getElementById('duty-btn'); 
            btn.innerText = s ? "Go Offline" : "Go Online"; 
            btn.className = s ? "w-full py-12 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl uppercase tracking-tighter" : "w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl uppercase tracking-tighter"; 
        };

        window.toggleDashboard = (s) => { 
            document.getElementById('driver-dashboard').classList.toggle('hidden', !s); 
            if(s) {
                document.getElementById('edit-name').value = userData.name || "";
                document.getElementById('edit-phone').value = userData.phone || "";
                document.getElementById('edit-messenger').value = userData.messenger || "";
                document.getElementById('edit-address').value = userData.address || "";
                document.getElementById('edit-mtop').value = userData.mtop || "";
                document.getElementById('edit-plate').value = userData.plate || "";
            }
        };

        window.updateProfile = async () => {
            const name = document.getElementById('edit-name').value;
            const phone = document.getElementById('edit-phone').value;
            const messenger = document.getElementById('edit-messenger').value;
            const address = document.getElementById('edit-address').value;
            const mtop = document.getElementById('edit-mtop').value;
            const plate = document.getElementById('edit-plate').value;

            if(!name) return alert("Alias name is required.");

            await updateDoc(doc(db, COLL, userUid), { 
                name, 
                phone, 
                messenger, 
                address, 
                mtop, 
                plate 
            });

            showAlert("Profile Updated", "Your information has been successfully saved.", "success");
            toggleDashboard(false);
        };

        window.logout = async () => { 
            if (userUid) await updateDoc(doc(db, COLL, userUid), { isOnline: false }); 
            signOut(auth).then(() => location.reload()); 
        };

        window.setStar = (n) => { 
            currentRating = n; 
            const s = document.getElementById('star-box').children; 
            for(let i=0; i<5; i++) s[i].className = i < n ? 'fa-solid fa-star text-amber-400' : 'fa-solid fa-star text-gray-200'; 
        };
    </script>
</body>
</html>
