<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 40vh; width: 100%; z-index: 1; transition: height 0.3s ease; }
        #map.hidden-map { height: 0vh; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .marker-label { background: white; border-radius: 6px; padding: 2px 6px; font-size: 10px; font-weight: 800; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #eee; white-space: nowrap; }
        .star-btn { font-size: 32px; color: #d1d5db; cursor: pointer; transition: color 0.2s; }
        .star-btn.active { color: #facc15; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <!-- 1. AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
            <p class="opacity-80 font-medium text-lg">Premium Transport</p>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold placeholder:text-white/50 text-white">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold placeholder:text-white/50 text-white">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-5 bg-emerald-700 text-white border-2 border-emerald-500 rounded-2xl font-black">Register</button>
            <button onclick="handleAuth('anon')" class="w-full py-3 text-white/70 font-bold text-sm">Continue as Guest ✨</button>
        </div>
    </div>

    <!-- 2. SETUP SCREEN -->
    <div id="setup-screen" class="hidden fixed inset-0 z-[5100] bg-white flex flex-col p-10 items-center justify-center">
        <h2 class="text-3xl font-black mb-8 italic">Finish Profile</h2>
        <div class="w-full max-w-xs space-y-4 text-center">
            <input id="setup-name" type="text" placeholder="Your Full Name" class="w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <select id="setup-role" class="w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none" onchange="togglePlateField()">
                <option value="passenger">Passenger</option>
                <option value="driver">Driver</option>
            </select>
            <input id="setup-plate" type="text" placeholder="Plate Number (ABC-123)" class="hidden w-full p-5 bg-gray-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <button onclick="saveInitialProfile()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-100 mt-4">Save & Start</button>
        </div>
    </div>

    <!-- 3. MAIN APP UI -->
    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div class="absolute top-4 left-4 right-4 z-[1000] glass p-3 rounded-2xl flex justify-between items-center shadow-lg border border-white/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center">
                    <i id="role-icon" class="fa-solid fa-person"></i>
                </div>
                <div>
                    <p id="user-display" class="font-black text-sm text-gray-800 line-clamp-1">User</p>
                    <p id="role-display" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Passenger</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="toggle-map-btn" onclick="toggleMap()" class="p-3 text-emerald-600 bg-emerald-50 rounded-xl"><i class="fa-solid fa-map"></i></button>
                <button onclick="location.reload()" class="p-3 text-red-500 bg-red-50 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto custom-scroll">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <div id="passenger-panel" class="hidden">
                <div id="active-ride-status" class="hidden mb-6 bg-blue-600 text-white p-5 rounded-3xl animate-pop">
                    <p class="text-[10px] font-black uppercase opacity-70 tracking-widest">Ongoing Trip</p>
                    <p id="status-driver-text" class="text-lg font-black italic">Waiting for response...</p>
                </div>
                <div class="mb-6 relative">
                    <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input id="dest-input" type="text" placeholder="Where are you going?" class="w-full p-5 pl-12 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500 transition-all">
                </div>
                <div id="driver-list" class="space-y-3 mb-8"></div>
            </div>

            <div id="driver-panel" class="hidden">
                <div id="driver-active-trip" class="hidden w-full p-6 bg-emerald-50 border-2 border-emerald-200 rounded-[2.5rem] mb-6 text-center animate-pop">
                    <h2 id="current-p-name" class="text-2xl font-black mb-1">...</h2>
                    <p id="current-p-dest" class="text-sm font-bold text-gray-500 mb-6">Loading destination...</p>
                    <button onclick="completeTrip()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">FINISH RIDE</button>
                </div>
                <div id="driver-offline-ui" class="mb-8">
                    <button id="duty-btn" onclick="toggleDuty()" class="w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl">GO ONLINE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "isulan-trike-2026";
        const COLL_PATH = `artifacts/${appId}/public/data/users`;

        let userUid, userData, map, userMarker, peerMarkers = {}, currentRating = 0, activeDriverId = null;

        // AUTH HANDLERS
        window.handleAuth = async (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(type === 'anon') await signInAnonymously(auth);
                else if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
                else await createUserWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL_PATH, userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    launchApp();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('setup-screen').classList.remove('hidden');
                }
            }
        });

        window.saveInitialProfile = async () => {
            const name = document.getElementById('setup-name').value;
            const role = document.getElementById('setup-role').value;
            if(!name) return alert("Enter your name");
            userData = { uid: userUid, name, role, rating: 5, totalRates: 0, earnings: 0, isOnline: false, history: [] };
            await setDoc(doc(db, COLL_PATH, userUid), userData);
            launchApp();
        };

        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('role-display').innerText = userData.role;
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            initMap();
            listenForPeers();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([6.6294, 124.605], { radius: 10, color: '#fff', fillColor: '#10b981', fillOpacity: 1, weight: 4 }).addTo(map);
        }

        function listenForPeers() {
            onSnapshot(collection(db, COLL_PATH), snap => {
                if(userData.role === 'passenger') document.getElementById('driver-list').innerHTML = '';
                snap.forEach(dDoc => {
                    const data = dDoc.data();
                    if(dDoc.id === userUid) return;
                    if(userData.role === 'passenger' && data.role === 'driver' && data.isOnline) {
                        document.getElementById('driver-list').innerHTML += `
                            <div class="p-5 bg-white border rounded-2xl flex justify-between items-center">
                                <p class="font-black">${data.name}</p>
                                <button class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-bold">BOOK</button>
                            </div>`;
                    }
                });
            });
        }

        window.toggleDuty = async () => {
            userData.isOnline = !userData.isOnline;
            const btn = document.getElementById('duty-btn');
            btn.innerText = userData.isOnline ? "GO OFFLINE" : "GO ONLINE";
            btn.className = userData.isOnline ? "w-full py-8 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl" : "w-full py-8 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: userData.isOnline });
        };
    </script>
</body>
</html>
