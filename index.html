<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #map { height: 45vh; width: 100%; filter: grayscale(0.2) contrast(1.1); }
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        input:focus { transform: translateY(-2px); transition: all 0.2s; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 overflow-hidden">

    <!-- 1. LUXURY AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-white flex flex-col p-8 justify-between">
        <div class="mt-12">
            <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mb-6">
                <span class="text-3xl">🛺</span>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight">Isulan<span class="text-emerald-600">Trike</span></h1>
            <p class="text-slate-500 font-medium mt-2">Premium local transport experience.</p>
        </div>

        <div class="space-y-4">
            <div id="login-inputs" class="space-y-3">
                <input id="auth-email" type="email" placeholder="Email Address" class="w-full p-5 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-emerald-500/20">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-emerald-500/20">
                <button onclick="handleAuth('login')" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold card-shadow">Sign In</button>
                <button onclick="handleAuth('register')" class="w-full py-4 text-emerald-600 font-bold">Create new account</button>
            </div>
            
            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] bg-slate-200 flex-1"></div>
                <span class="text-xs font-bold text-slate-400">OR</span>
                <div class="h-[1px] bg-slate-200 flex-1"></div>
            </div>

            <button onclick="handleAuth('anon')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                Continue as Guest <span>✨</span>
            </button>
        </div>
    </div>

    <!-- 2. THE DASHBOARD (LANDING) -->
    <div id="landing-page" class="hidden fixed inset-0 z-[4500] bg-white flex flex-col">
        <header class="p-6 pt-12 flex justify-between items-end">
            <div>
                <p id="land-role" class="text-[10px] font-extrabold text-emerald-600 uppercase tracking-widest mb-1"></p>
                <h2 class="text-3xl font-black">Hi, <span id="land-name" class="text-slate-800">Kaiser</span></h2>
            </div>
            <button onclick="goToApp()" class="btn-gradient px-8 py-4 rounded-2xl text-white font-bold shadow-lg shadow-emerald-200">Start Ride</button>
        </header>

        <!-- Stats Section (Driver Only) -->
        <div id="driver-stats" class="hidden px-6 grid grid-cols-2 gap-4 mt-6">
            <div class="p-6 bg-slate-900 rounded-[2rem] text-white">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">Earnings</p>
                <p class="text-3xl font-black">₱<span id="stat-earn">0</span></p>
            </div>
            <div class="p-6 bg-emerald-50 rounded-[2rem] border border-emerald-100">
                <p class="text-xs font-bold text-emerald-600 uppercase mb-2">Completed</p>
                <p class="text-3xl font-black text-emerald-900" id="stat-trips">0</p>
            </div>
        </div>

        <!-- History List -->
        <div class="flex-1 px-6 mt-8 overflow-y-auto hide-scroll pb-20">
            <h3 class="text-lg font-bold mb-4 flex items-center justify-between">
                Activity History
                <span id="anon-tag" class="hidden text-[10px] bg-slate-100 px-3 py-1 rounded-full text-slate-400">LOCKED FOR GUESTS</span>
            </h3>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <button onclick="auth.signOut().then(()=>location.reload())" class="absolute bottom-8 left-1/2 -translate-x-1/2 text-xs font-bold text-slate-400 underline">Sign out of session</button>
    </div>

    <!-- 3. MAIN MAP UI -->
    <div id="app-ui" class="hidden h-screen flex flex-col">
        <div class="glass-nav p-4 flex items-center gap-4 fixed top-0 w-full z-[2000]">
            <button onclick="showLanding()" class="p-3 bg-white rounded-xl shadow-sm"><span class="text-xl">🏠</span></button>
            <h4 class="font-bold">Live Network</h4>
        </div>
        <div id="map"></div>
        
        <div class="flex-1 bg-white rounded-t-[3rem] -mt-12 z-[1001] p-8 shadow-[0_-20px_50px_rgba(0,0,0,0.08)]">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            
            <div id="passenger-view" class="hidden">
                <h3 class="text-xl font-extrabold mb-4">Where to?</h3>
                <input id="dest-input" type="text" placeholder="Enter destination in Isulan..." class="w-full p-5 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-emerald-500/20 mb-6 font-semibold">
                <div id="available-drivers" class="space-y-3"></div>
            </div>

            <div id="driver-view" class="hidden">
                <button id="duty-toggle" onclick="toggleDuty()" class="w-full py-8 rounded-[2.5rem] bg-slate-100 text-slate-400 font-black text-2xl transition-all">GO ONLINE</button>
            </div>
        </div>
    </div>

    <!-- SETUP PROFILE MODAL -->
    <div id="profile-modal" class="hidden fixed inset-0 z-[5500] bg-white flex flex-col p-8 items-center justify-center">
        <h2 class="text-3xl font-black mb-2">Final Step</h2>
        <p class="text-slate-500 mb-8 font-medium">Customize your profile identity.</p>
        <input id="reg-name" type="text" placeholder="Display Name" class="w-full p-5 bg-slate-100 rounded-2xl mb-4">
        <select id="reg-role" class="w-full p-5 bg-slate-100 rounded-2xl mb-4 font-bold" onchange="togglePlateField()">
            <option value="passenger">Passenger</option>
            <option value="driver">Driver</option>
        </select>
        <input id="reg-plate" type="text" placeholder="Plate Number (e.g. ABC-123)" class="hidden w-full p-5 bg-slate-100 rounded-2xl mb-6">
        <button onclick="finalizeProfile()" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold">Complete Setup</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = "isulan_elite_v3";
        let userUid, userData;

        // --- AUTH LOGIC ---
        window.handleAuth = (type) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(type === 'login') signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            if(type === 'register') createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            if(type === 'anon') signInAnonymously(auth);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL, userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    showLanding();
                } else {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('profile-modal').classList.remove('hidden');
                }
            }
        });

        window.finalizeProfile = async () => {
            userData = {
                uid: userUid,
                name: document.getElementById('reg-name').value || "User",
                role: document.getElementById('reg-role').value,
                plate: document.getElementById('reg-plate').value || 'N/A',
                isAnonymous: auth.currentUser.isAnonymous,
                history: [],
                earnings: 0,
                trips: 0
            };
            await setDoc(doc(db, COLL, userUid), userData);
            location.reload();
        };

        // --- UI NAVIGATION ---
        window.showLanding = () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
            
            document.getElementById('land-name').innerText = userData.name;
            document.getElementById('land-role').innerText = userData.role;

            if(userData.role === 'driver') {
                document.getElementById('driver-stats').classList.remove('hidden');
                document.getElementById('stat-earn').innerText = userData.earnings;
                document.getElementById('stat-trips').innerText = userData.trips;
            }

            const list = document.getElementById('history-list');
            if(userData.isAnonymous) {
                document.getElementById('anon-tag').classList.remove('hidden');
                list.innerHTML = `<div class="p-10 text-center text-slate-300 font-bold">Register to unlock trip history</div>`;
            } else {
                list.innerHTML = userData.history.length ? "" : `<div class="p-10 text-center text-slate-300 font-bold">No trips yet</div>`;
                userData.history.reverse().forEach(trip => {
                    list.innerHTML += `
                        <div class="p-5 bg-white border border-slate-100 rounded-3xl card-shadow">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-extrabold text-emerald-600">₱${trip.fare}</span>
                                <span class="text-[9px] text-slate-400 font-bold">${trip.time}</span>
                            </div>
                            <p class="font-bold text-slate-800">${trip.dest}</p>
                            <p class="text-[10px] text-slate-400 mt-1">Picked up at ${trip.pickup}</p>
                        </div>`;
                });
            }
        };

        window.goToApp = () => {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById(userData.role + '-view').classList.remove('hidden');
            // Init Leaflet map here...
        };

        window.togglePlateField = () => {
            document.getElementById('reg-plate').classList.toggle('hidden', document.getElementById('reg-role').value !== 'driver');
        };
    </script>
</body>
</html>
