<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakay - Drive Or Ride</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; background-color: #f8fafc; }
        #map { height: 45vh; width: 100%; z-index: 1; }
        .content-card { 
            position: relative; height: 55vh; margin-top: -2.5rem; 
            background: white; border-top-left-radius: 2.5rem; border-top-right-radius: 2.5rem;
            z-index: 10; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .marquee-container { 
            background: #064e3b; color: #fbbf24; overflow: hidden; white-space: nowrap; 
            display: flex; align-items: center; min-height: 40px; font-size: 13px; font-weight: 800; 
        }
        .marquee-content { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .role-card.active { border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .nav-bar { 
            height: 75px; position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #f1f5f9; z-index: 50;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #10b981; }
        #duty-btn.online { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; }
        .driver-marker-icon { color: #10b981; font-size: 26px; }
        .passenger-marker-icon { color: #3b82f6; font-size: 26px; }
        .history-card { background: white; padding: 1rem; border-radius: 1rem; border: 1px solid #f1f5f9; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="marquee-container">
        <div class="marquee-content">🚀 WELCOME TO SAKAY • OFFICIAL ISULAN TRICYCLE RATES APPLY • PLEASE DRIVE SAFELY • </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[9000] bg-emerald-600 flex flex-col p-8 justify-center text-white">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter">Sakay</h1>
            <p class="text-emerald-100 font-bold opacity-70 text-xs uppercase tracking-widest">Drive Or Ride</p>
        </div>
        <div class="max-w-xs mx-auto w-full space-y-4">
            <div id="login-actions" class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none">
                <button onclick="handleAuth('login')" class="w-full py-4 bg-amber-400 text-emerald-900 rounded-2xl font-black text-lg">SIGN IN</button>
                <button onclick="showRegisterUI()" class="w-full py-4 border border-white/30 rounded-2xl font-bold text-sm">Create Account</button>
            </div>
            <div id="reg-ui" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div onclick="selectRole('passenger')" id="role-p" class="role-card p-4 border border-white/30 rounded-2xl text-center cursor-pointer">
                        <i class="fa-solid fa-user mb-1"></i><p class="text-[10px] font-black uppercase">Passenger</p>
                    </div>
                    <div onclick="selectRole('driver')" id="role-d" class="role-card p-4 border border-white/30 rounded-2xl text-center cursor-pointer">
                        <i class="fa-solid fa-motorcycle mb-1"></i><p class="text-[10px] font-black uppercase">Driver</p>
                    </div>
                </div>
                <input id="reg-alias" type="text" placeholder="Full Name" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none">
                <button onclick="handleAuth('register')" class="w-full py-4 bg-white text-emerald-700 rounded-2xl font-black">REGISTER</button>
                <button onclick="showLoginUI()" class="w-full text-white/60 text-xs">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div id="status-overlay" class="hidden fixed inset-0 bg-emerald-950/95 z-[5000] flex flex-col items-center justify-center p-10 text-white text-center">
            <div class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center mb-6 animate-pulse">
                <i class="fa-solid fa-motorcycle text-3xl"></i>
            </div>
            <h2 class="text-3xl font-black italic">RIDE IN PROGRESS</h2>
            <p id="active-fare-display" class="text-5xl font-black mt-8">₱0</p>
            <button onclick="triggerSOS()" class="mt-12 w-full py-4 bg-red-600 rounded-2xl font-black">🚨 EMERGENCY SOS</button>
        </div>

        <div id="content-panel" class="content-card overflow-y-auto pb-32 px-6">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto my-4"></div>

            <div id="driver-panel" class="hidden">
                <div id="trip-card" class="hidden mb-6 p-6 bg-emerald-50 border border-emerald-100 rounded-3xl">
                    <h4 id="trip-p-name" class="text-xl font-black text-gray-800"></h4>
                    <p id="trip-p-dest" class="text-gray-500 text-sm mb-4"></p>
                    <div id="driver-actions" class="flex gap-2"></div>
                </div>
                <button id="duty-btn" onclick="toggleDuty()" class="w-full py-16 text-3xl font-black uppercase rounded-[2.5rem] bg-gray-50 text-gray-300 border-2 border-dashed border-gray-200">GO ONLINE</button>
            </div>

            <div id="passenger-panel" class="hidden">
                <div class="bg-blue-600 p-5 rounded-2xl mb-4 flex justify-between items-center text-white">
                    <div><p class="text-[10px] font-bold opacity-80">Est. Fare</p><p id="display-fare" class="text-3xl font-black">₱0.00</p></div>
                    <i class="fa-solid fa-coins text-2xl"></i>
                </div>
                <select id="dest-select" onchange="calculateFare()" class="w-full p-5 bg-gray-50 rounded-3xl border-2 border-transparent focus:border-emerald-500 outline-none font-bold mb-4 appearance-none">
                    <option value="0" disabled selected>Select Destination</option>
                    <option value="21" data-name="Poblacion">Poblacion - ₱21</option>
                    <option value="27" data-name="Kalawag 1">Kalawag 1 - ₱27</option>
                    <option value="35" data-name="Bambad">Bambad - ₱35</option>
                    <option value="55" data-name="Mapantig">Mapantig - ₱55</option>
                </select>
                <div id="p-waiting-card" class="hidden mb-6 p-6 bg-blue-50 border border-blue-100 rounded-3xl text-center">
                    <p id="wait-driver-name" class="font-black text-blue-800 mb-4">Requesting...</p>
                    <button onclick="cancelTrip()" class="px-6 py-2 bg-red-100 text-red-600 rounded-full text-xs font-black">CANCEL</button>
                </div>
                <div id="driver-list" class="space-y-3"></div>
            </div>
        </div>

        <div class="nav-bar">
            <button onclick="toggleDashboard(false)" class="nav-btn active"><i class="fa-solid fa-map-location-dot text-2xl mb-1"></i>Map</button>
            <button onclick="toggleDashboard(true)" class="nav-btn"><i class="fa-solid fa-history text-2xl mb-1"></i>Hub</button>
            <button onclick="logout()" class="nav-btn text-red-400"><i class="fa-solid fa-power-off text-2xl mb-1"></i>Logout</button>
        </div>
    </div>

    <div id="user-dashboard" class="hidden fixed inset-0 z-[8000] bg-slate-50 overflow-y-auto p-6 pb-32">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-4xl font-black tracking-tighter">Hub</h2>
            <button onclick="toggleDashboard(false)" class="w-10 h-10 bg-white rounded-full shadow-sm">✕</button>
        </div>
        
        <div id="driver-stats" class="hidden grid grid-cols-1 gap-4 mb-8">
            <div class="bg-emerald-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                <p class="text-xs font-bold opacity-70 uppercase">Total Earnings</p>
                <p class="text-5xl font-black mt-2">₱<span id="stat-income">0</span></p>
            </div>
        </div>

        <div class="space-y-4">
            <h4 class="font-black text-gray-800 uppercase text-xs tracking-widest">Recent Activity</h4>
            <div id="history-list">
                <p class="text-gray-400 text-xs italic">No recent rides found.</p>
            </div>
        </div>
    </div>

    <div id="rating-modal" class="hidden fixed inset-0 z-[9600] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center">
            <h3 class="text-3xl font-black mb-8">Rate Ride</h3>
            <div id="star-box" class="flex justify-center gap-3 text-4xl mb-8 text-amber-400">
                <i onclick="setStar(1)" class="fa-solid fa-star"></i>
                <i onclick="setStar(2)" class="fa-solid fa-star"></i>
                <i onclick="setStar(3)" class="fa-solid fa-star"></i>
                <i onclick="setStar(4)" class="fa-solid fa-star"></i>
                <i onclick="setStar(5)" class="fa-solid fa-star"></i>
            </div>
            <button onclick="finishTripPassenger()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black">SUBMIT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment, addDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
            authDomain: "isulantrike.firebaseapp.com",
            projectId: "isulantrike",
            storageBucket: "isulantrike.firebasestorage.app",
            messagingSenderId: "262164007490",
            appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userUid, userData, map, markers = {}, currentRating = 5, selectedRole = null;

        // FIXED: Removed blue lines and automatic zoom-in zoom-out
        window.calculateFare = () => {
            const select = document.getElementById('dest-select');
            document.getElementById('display-fare').innerText = "₱" + select.value;
        };

        window.setStar = (n) => {
            currentRating = n;
            const stars = document.querySelectorAll('#star-box i');
            stars.forEach((s, i) => s.classList.toggle('text-amber-400', i < n));
            stars.forEach((s, i) => s.classList.toggle('text-gray-200', i >= n));
        };

        window.selectRole = (role) => {
            selectedRole = role;
            document.getElementById('role-p').classList.toggle('active', role === 'passenger');
            document.getElementById('role-d').classList.toggle('active', role === 'driver');
        };

        window.handleAuth = async (t) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if (t === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const alias = document.getElementById('reg-alias').value;
                    const cred = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        name: alias, role: selectedRole, isOnline: false,
                        lat: 6.6294, lng: 124.605, income: 0, tripCount: 0, totalRating: 0
                    });
                }
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userUid = u.uid;
                const snap = await getDoc(doc(db, "users", userUid));
                userData = snap.data();
                initApp();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            if (userData.role === 'driver') document.getElementById('driver-stats').classList.remove('hidden');
            
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            navigator.geolocation.watchPosition(p => {
                updateDoc(doc(db, "users", userUid), { lat: p.coords.latitude, lng: p.coords.longitude, lastActive: Date.now() });
            });
            syncData();
            loadHistory();
        }

        function syncData() {
            onSnapshot(collection(db, "users"), (snap) => {
                const dList = document.getElementById('driver-list');
                if (userData.role === 'passenger') dList.innerHTML = '';
                
                snap.forEach(d => {
                    const data = d.data(), id = d.id;
                    if (id === userUid) {
                        userData = data;
                        handleStatusLogic();
                        if (userData.role === 'driver') document.getElementById('stat-income').innerText = data.income || 0;
                    }
                    
                    // Marker Update
                    const isOnline = data.isOnline || (userData.activeTrip && (id === userData.activeTrip.dId || id === userData.activeTrip.pId));
                    if (isOnline && data.lat) {
                        if (markers[id]) markers[id].setLatLng([data.lat, data.lng]);
                        else markers[id] = L.marker([data.lat, data.lng], {
                            icon: L.divIcon({ html: `<i class="fa-solid ${data.role === 'driver' ? 'fa-motorcycle driver-marker-icon' : 'fa-person-walking passenger-marker-icon'}"></i>`, className: '' })
                        }).addTo(map);
                    } else if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }

                    // Passenger View: Available Drivers
                    if (userData.role === 'passenger' && data.role === 'driver' && data.isOnline && !data.activeTrip) {
                        dList.innerHTML += `<div class="p-5 bg-white border rounded-3xl flex justify-between items-center" onclick="bookDriver('${id}')">
                            <div><p class="font-black">${data.name}</p><p class="text-[10px] text-amber-500 font-bold">⭐ ${(data.totalRating / (data.tripCount || 1)).toFixed(1)}</p></div>
                            <button class="bg-emerald-600 text-white px-6 py-2 rounded-2xl text-xs font-black">BOOK</button></div>`;
                    }
                });
            });
        }

        async function loadHistory() {
            const hList = document.getElementById('history-list');
            const q = query(collection(db, "history"), where(userData.role === 'driver' ? "dId" : "pId", "==", userUid), orderBy("timestamp", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                if (snap.empty) return;
                hList.innerHTML = '';
                snap.forEach(doc => {
                    const h = doc.data();
                    const date = new Date(h.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    hList.innerHTML += `
                        <div class="history-card">
                            <div class="flex justify-between items-start mb-2">
                                <p class="font-black text-emerald-700">₱${h.fare}</p>
                                <p class="text-[10px] text-gray-400 font-bold">${date}</p>
                            </div>
                            <p class="text-sm font-bold text-gray-800"><i class="fa-solid fa-location-dot mr-2 text-red-400"></i>${h.dest}</p>
                            <p class="text-[10px] text-gray-500 mt-1">Rider: ${userData.role === 'driver' ? h.pName : h.dName}</p>
                        </div>`;
                });
            });
        }

        function handleStatusLogic() {
            const overlay = document.getElementById('status-overlay'), tripCard = document.getElementById('trip-card'), pWait = document.getElementById('p-waiting-card');
            overlay.classList.add('hidden'); tripCard.classList.add('hidden'); pWait.classList.add('hidden');
            
            if (!userData.activeTrip) return;
            const t = userData.activeTrip;

            if (userData.role === 'driver') {
                tripCard.classList.remove('hidden');
                document.getElementById('trip-p-name').innerText = t.pName;
                document.getElementById('trip-p-dest').innerText = "To: " + t.dest;
                const actions = document.getElementById('driver-actions');
                if (t.status === 'requested') actions.innerHTML = `<button onclick="updateStatus('accepted')" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-black">ACCEPT</button>`;
                else if (t.status === 'accepted') actions.innerHTML = `<button onclick="updateStatus('pickedup')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">PICKED UP</button>`;
                else if (t.status === 'pickedup') actions.innerHTML = `<button onclick="updateStatus('arrived')" class="w-full py-4 bg-orange-600 text-white rounded-2xl font-black">COMPLETE</button>`;
            } else {
                pWait.classList.remove('hidden');
                document.getElementById('wait-driver-name').innerText = t.status === 'requested' ? "Finding driver..." : `${t.dName} is on the way!`;
                if (t.status === 'pickedup') { overlay.classList.remove('hidden'); document.getElementById('active-fare-display').innerText = "₱" + t.fare; }
                if (t.status === 'arrived') document.getElementById('rating-modal').classList.remove('hidden');
            }
        }

        window.bookDriver = async (dId) => {
            const select = document.getElementById('dest-select');
            if (select.value == 0) return alert("Select destination");
            const dSnap = await getDoc(doc(db, "users", dId));
            const trip = { status: 'requested', pId: userUid, pName: userData.name, dId, dName: dSnap.data().name, dest: select.options[select.selectedIndex].getAttribute('data-name'), fare: select.value, timestamp: Date.now() };
            await updateDoc(doc(db, "users", dId), { activeTrip: trip });
            await updateDoc(doc(db, "users", userUid), { activeTrip: trip });
        };

        window.updateStatus = async (s) => {
            const t = userData.activeTrip;
            if (s === 'arrived') {
                await addDoc(collection(db, "history"), { ...t, timestamp: Date.now() });
                await updateDoc(doc(db, "users", userUid), { activeTrip: deleteField(), income: increment(parseInt(t.fare)), tripCount: increment(1) });
                await updateDoc(doc(db, "users", t.pId), { "activeTrip.status": "arrived" });
            } else {
                await updateDoc(doc(db, "users", userUid), { "activeTrip.status": s });
                await updateDoc(doc(db, "users", t.pId), { "activeTrip.status": s });
            }
        };

        window.finishTripPassenger = async () => {
            const t = userData.activeTrip;
            if (t.dId) await updateDoc(doc(db, "users", t.dId), { totalRating: increment(currentRating) });
            await updateDoc(doc(db, "users", userUid), { activeTrip: deleteField() });
            document.getElementById('rating-modal').classList.add('hidden');
        };

        window.toggleDuty = () => updateDoc(doc(db, "users", userUid), { isOnline: !userData.isOnline });
        window.toggleDashboard = (show) => {
            document.getElementById('user-dashboard').classList.toggle('hidden', !show);
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns[0].classList.toggle('active', !show);
            navBtns[1].classList.toggle('active', show);
        };
        window.cancelTrip = async () => {
            const t = userData.activeTrip;
            await updateDoc(doc(db, "users", t.dId), { activeTrip: deleteField() });
            await updateDoc(doc(db, "users", userUid), { activeTrip: deleteField() });
        };
        window.logout = () => signOut(auth).then(() => location.reload());
        window.showRegisterUI = () => { document.getElementById('login-actions').classList.add('hidden'); document.getElementById('reg-ui').classList.remove('hidden'); };
        window.showLoginUI = () => { document.getElementById('login-actions').classList.remove('hidden'); document.getElementById('reg-ui').classList.add('hidden'); };
    </script>
</body>
</html>
