<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 50vh; width: 100%; filter: saturate(1.1) brightness(1.02); }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .btn-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .panel-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <!-- 1. AUTHENTICATION -->
    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-white flex flex-col p-8 justify-between">
        <div class="mt-12">
            <div class="w-20 h-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center mb-6">
                <span class="text-4xl">🛺</span>
            </div>
            <h1 class="text-5xl font-extrabold tracking-tighter">Isulan<span class="text-emerald-600">Trike</span></h1>
            <p class="text-slate-400 font-medium mt-2">Elite transport at your fingertips.</p>
        </div>

        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-semibold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-slate-100 rounded-2xl outline-none font-semibold">
            <button onclick="handleAuth('login')" class="btn-gradient w-full py-5 rounded-2xl text-white font-bold shadow-xl shadow-emerald-100">Sign In</button>
            <button onclick="handleAuth('anon')" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold">Guest Access</button>
            <button onclick="handleAuth('register')" class="w-full py-2 text-emerald-600 font-bold text-sm">Create Account</button>
        </div>
    </div>

    <!-- 2. DASHBOARD / LANDING -->
    <div id="landing-page" class="hidden fixed inset-0 z-[4000] bg-white flex flex-col p-8">
        <div class="flex justify-between items-start mb-8">
            <div>
                <p id="land-role-label" class="text-[10px] font-black text-emerald-600 uppercase tracking-widest"></p>
                <h2 class="text-4xl font-black text-slate-800">Hi, <span id="land-name">User</span></h2>
            </div>
            <button onclick="goToApp()" class="btn-gradient p-5 rounded-[1.5rem] text-white shadow-lg shadow-emerald-200">
                <span class="text-xl">🗺️</span>
            </button>
        </div>

        <div id="driver-stats" class="hidden grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-900 p-6 rounded-[2rem] text-white">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Balance</p>
                <p class="text-2xl font-black">₱<span id="stat-earn">0</span></p>
            </div>
            <div class="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 text-emerald-900">
                <p class="text-[9px] text-emerald-400 font-bold uppercase mb-1">Trips Done</p>
                <p class="text-2xl font-black" id="stat-trips">0</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto hide-scroll">
            <h3 class="text-lg font-bold mb-4">Recent Activity</h3>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <button onclick="processLogout()" class="mt-6 py-4 border-2 border-slate-100 rounded-2xl text-slate-400 font-bold flex items-center justify-center gap-2">
            <span class="text-lg">Logout</span>
        </button>
    </div>

    <!-- 3. INTERACTIVE MAP UI -->
    <div id="app-ui" class="hidden fixed inset-0 z-[4500] bg-white flex flex-col">
        <div id="map"></div>
        
        <!-- UI Overlay -->
        <div class="absolute top-6 left-6 right-6 z-[4600] flex justify-between items-center pointer-events-none">
            <button onclick="backToDashboard()" class="p-4 bg-white/90 backdrop-blur rounded-2xl shadow-xl pointer-events-auto active:scale-95">
                <span class="text-xl font-bold text-slate-800">🏠</span>
            </button>
            <div id="status-pill" class="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-full shadow-xl pointer-events-auto uppercase tracking-tighter">
                Map View
            </div>
        </div>

        <!-- Sliding Panel -->
        <div class="flex-1 bg-white rounded-t-[3.5rem] -mt-16 z-[4550] p-10 shadow-[0_-20px_60px_rgba(0,0,0,0.1)] overflow-y-auto">
            <div class="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-8"></div>

            <!-- Passenger Dashboard: Driver Selection -->
            <div id="passenger-panel" class="hidden">
                <h3 class="text-2xl font-black mb-6 italic">Available Drivers</h3>
                <div id="driver-list" class="space-y-3">
                    <p class="text-slate-300 font-bold text-center py-10">Scanning for online drivers...</p>
                </div>
            </div>

            <!-- Driver Dashboard: Duty Toggle -->
            <div id="driver-panel" class="hidden">
                <div id="duty-btn" onclick="toggleDuty()" class="w-full py-16 rounded-[3rem] bg-slate-50 border-4 border-dashed border-slate-100 text-slate-300 font-black text-3xl flex flex-col items-center justify-center transition-all cursor-pointer">
                    <span id="duty-text">GO ONLINE</span>
                    <span id="duty-sub" class="text-xs mt-2 opacity-50">You are currently offline</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. MODALS & POPUPS -->
    <div id="pop-request" class="hidden fixed inset-0 z-[6000] bg-slate-900/40 backdrop-blur-md flex items-end sm:items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[3rem] p-10 animate-pop">
            <div class="flex justify-between items-center mb-6">
                <span class="bg-emerald-100 text-emerald-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Ride Request</span>
                <span class="font-black">₱21.00</span>
            </div>
            <h3 id="req-passenger-name" class="text-3xl font-black mb-6">Kaiser</h3>
            <button onclick="acceptTrip()" class="w-full py-5 btn-gradient text-white rounded-3xl font-bold shadow-xl mb-3">Accept Ride</button>
            <button onclick="closePop('pop-request')" class="w-full py-5 bg-slate-50 text-slate-400 rounded-3xl font-bold">Decline</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, arrayUnion, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL = "isulan_elite_v3";
        
        let userUid, userData, map, driverMarkers = {}, passengerMarker;

        // --- AUTH & LOGOUT ---
        window.handleAuth = (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if(type === 'login') signInWithEmailAndPassword(auth, e, p).catch(alert);
            if(type === 'anon') signInAnonymously(auth).catch(alert);
        };

        window.processLogout = () => {
            if(userData.role === 'driver') updateDoc(doc(db, "active_drivers", userUid), { status: 'offline' });
            signOut(auth).then(() => location.reload());
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userUid = user.uid;
                const snap = await getDoc(doc(db, COLL, userUid));
                if(snap.exists()) {
                    userData = snap.data();
                    showDashboard();
                } else {
                    // Force profile creation logic if needed
                    document.getElementById('auth-screen').classList.add('hidden');
                }
            }
        });

        // --- DASHBOARD ---
        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
            
            document.getElementById('land-name').innerText = userData.name;
            document.getElementById('land-role-label').innerText = userData.role;

            if(userData.role === 'driver') {
                document.getElementById('driver-stats').classList.remove('hidden');
                document.getElementById('stat-earn').innerText = userData.earnings || 0;
                document.getElementById('stat-trips').innerText = userData.trips || 0;
            }
            renderHistory();
        }

        window.backToDashboard = () => showDashboard();

        // --- MAP & REALTIME ---
        window.goToApp = () => {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('app-ui').classList.remove('hidden');
            document.getElementById(userData.role + '-panel').classList.remove('hidden');
            if(!map) initMap();
            if(userData.role === 'passenger') listenForDrivers();
            if(userData.role === 'driver') listenForRequests();
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        // --- PASSENGER LOGIC ---
        function listenForDrivers() {
            onSnapshot(collection(db, "active_drivers"), (snap) => {
                const list = document.getElementById('driver-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === 'online') {
                        // Map Marker
                        if(!driverMarkers[doc.id]) {
                            driverMarkers[doc.id] = L.marker([d.lat, d.lng]).addTo(map).bindPopup(d.name);
                        }
                        // UI List
                        list.innerHTML += `
                            <div onclick="requestDriver('${doc.id}', '${d.name}')" class="p-5 bg-slate-50 rounded-3xl flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                                <div>
                                    <p class="font-black text-slate-800">${d.name}</p>
                                    <p class="text-[10px] text-emerald-500 font-bold uppercase">Online Now</p>
                                </div>
                                <span class="text-xl">🛺</span>
                            </div>`;
                    }
                });
            });
        }

        window.requestDriver = async (dUid, dName) => {
            await setDoc(doc(db, "ride_requests", dUid), {
                pUid: userUid,
                pName: userData.name,
                status: 'pending',
                timestamp: Date.now()
            });
            alert(`Request sent to ${dName}! Please wait.`);
        };

        // --- DRIVER LOGIC ---
        window.toggleDuty = async () => {
            const btn = document.getElementById('duty-btn');
            userData.isOnline = !userData.isOnline;
            
            if(userData.isOnline) {
                btn.className = "w-full py-16 rounded-[3rem] bg-emerald-600 text-white font-black text-3xl shadow-2xl shadow-emerald-200 border-none scale-[1.02]";
                document.getElementById('duty-text').innerText = "YOU ARE ONLINE";
                document.getElementById('duty-sub').innerText = "Visible to passengers in Isulan";
                
                // Set Location
                await setDoc(doc(db, "active_drivers", userUid), {
                    name: userData.name,
                    status: 'online',
                    lat: 6.6294, // In production, use navigator.geolocation
                    lng: 124.605
                });
            } else {
                location.reload(); // Quick reset
            }
        };

        function listenForRequests() {
            onSnapshot(doc(db, "ride_requests", userUid), (snap) => {
                if(snap.exists()) {
                    const req = snap.data();
                    document.getElementById('req-passenger-name').innerText = req.pName;
                    document.getElementById('pop-request').classList.remove('hidden');
                }
            });
        }

        window.acceptTrip = () => {
            alert("Trip accepted! Navigate to passenger.");
            document.getElementById('pop-request').classList.add('hidden');
            // Add Firestore logic to notify passenger
        };

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = userData.history?.length ? '' : '<p class="text-center text-slate-200 py-10">No records found</p>';
            (userData.history || []).forEach(h => {
                list.innerHTML += `<div class="p-5 bg-slate-50 rounded-2xl flex justify-between">
                    <p class="font-bold">${h.dest}</p>
                    <p class="text-emerald-600 font-black">₱${h.fare}</p>
                </div>`;
            });
        }
    </script>
</body>
</html>
