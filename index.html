<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IsulanTrike Elite - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; touch-action: manipulation; }
        #map { height: 45vh; width: 100%; z-index: 1; background: #cbd5e1; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-div-icon { background: none; border: none; }
        .marker-label { background: white; padding: 2px 8px; border-radius: 10px; font-weight: 800; font-size: 10px; border: 2px solid #10b981; margin-top: -40px; white-space: nowrap; }
        .payment-gradient { background: linear-gradient(135deg, #0052cc 0%, #00a3ff 100%); }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-emerald-600 flex flex-col p-8 justify-between text-white">
        <div class="mt-12 text-center">
            <i class="fa-solid fa-motorcycle text-7xl mb-4"></i>
            <h1 class="text-5xl font-black tracking-tighter">IsulanTrike</h1>
            <p class="font-bold opacity-80 uppercase tracking-widest text-xs mt-2">Driver & Passenger Hub</p>
        </div>
        <div class="space-y-4 w-full max-w-sm mx-auto">
            <input id="auth-email" type="email" placeholder="Email" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-5 bg-white/10 border border-white/20 rounded-2xl outline-none font-bold">
            <button onclick="handleAuth('login')" class="w-full py-5 bg-white text-emerald-700 rounded-2xl font-black shadow-xl">Sign In</button>
            <button onclick="handleAuth('register')" class="w-full py-5 bg-emerald-700 text-white border-2 border-emerald-500 rounded-2xl font-black">Register as New User</button>
        </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 z-[9000] bg-black/90 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl animate-pop text-center">
            <div class="payment-gradient p-8 text-white">
                <i class="fa-solid fa-wallet text-5xl mb-4"></i>
                <h3 class="text-2xl font-black italic">Daily Duty Pass</h3>
                <p class="text-sm font-bold opacity-80">Access the driver network for 24 hours</p>
            </div>
            <div class="p-8">
                <div class="flex justify-between items-center mb-6 bg-gray-50 p-4 rounded-2xl">
                    <span class="font-bold text-gray-500">Access Fee</span>
                    <span class="font-black text-2xl text-gray-800">₱20.00</span>
                </div>
                <button onclick="payWithGCash()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-3">
                    <i class="fa-solid fa-mobile-screen"></i> PAY VIA GCASH
                </button>
                <button onclick="closePayment()" class="mt-4 text-gray-400 font-bold text-sm uppercase">Maybe Later</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden flex-col h-full relative">
        <div id="map"></div>

        <div class="absolute top-4 left-4 right-4 z-[1000] glass p-3 rounded-2xl flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center font-bold" id="user-initial">U</div>
                <div>
                    <p id="user-display" class="font-black text-sm text-gray-800">User</p>
                    <p id="role-display" class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Role</p>
                </div>
            </div>
            <button onclick="logout()" class="p-3 text-red-500 bg-red-50 rounded-xl"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div id="content-panel" class="flex-1 bg-white rounded-t-[2.5rem] -mt-8 z-[1001] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] p-6 overflow-y-auto">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-6"></div>

            <div id="passenger-panel" class="hidden">
                <div id="p-status-box" class="hidden mb-6 p-5 rounded-3xl bg-emerald-600 text-white shadow-lg">
                    <p id="p-status-text" class="text-lg font-black italic">Connecting...</p>
                </div>
                <input id="dest-input" type="text" placeholder="Where are you going?" class="w-full p-5 bg-gray-50 rounded-2xl outline-none font-bold border-2 border-transparent focus:border-emerald-500 mb-6 shadow-inner">
                <div id="driver-list" class="space-y-3"></div>
            </div>

            <div id="driver-panel" class="hidden">
                <div id="sub-status" class="mb-4 text-center">
                    <span id="expiry-tag" class="text-[10px] font-black px-3 py-1 rounded-full bg-gray-100 text-gray-400">CHECKING STATUS...</span>
                </div>
                <div id="d-active-box" class="hidden w-full p-6 bg-emerald-50 border-2 border-emerald-200 rounded-[2.5rem] mb-6 text-center">
                    <h2 id="current-p-name" class="text-2xl font-black mb-1">...</h2>
                    <p id="current-p-dest" class="text-sm font-bold text-gray-500 mb-6">...</p>
                    <button onclick="completeTrip()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">MARK ARRIVED</button>
                </div>
                <button id="duty-btn" onclick="toggleDuty()" class="w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl transition-all shadow-sm">GO ONLINE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc, deleteField, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = { 
            apiKey: "AIzaSyBbHxg48BTT8IN0_RJuGyy6-FQCwq5jcF4",
  authDomain: "isulantrike.firebaseapp.com",
  projectId: "isulantrike",
  storageBucket: "isulantrike.firebasestorage.app",
  messagingSenderId: "262164007490",
  appId: "1:262164007490:web:2ba9c91b468bbd09ff3bdb",
  measurementId: "G-3K2TEVV4X5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLL_PATH = `artifacts/isulan-trike-2026/public/data/users`;

        let userUid, userData, map, unsubscribe, markers = {}, lastUpdate = 0;

        // AUTH HANDLER
        window.handleAuth = async (type) => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if(type === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const cred = await createUserWithEmailAndPassword(auth, e, p);
                    const isDriver = confirm("Register as Driver? (Click Cancel for Passenger)");
                    await setDoc(doc(db, COLL_PATH, cred.user.uid), { 
                        name: e.split('@')[0], 
                        role: isDriver ? "driver" : "passenger", 
                        tripCount: 0, 
                        totalRating: 0, 
                        isOnline: false, 
                        subscriptionExpiry: 0,
                        lat: 6.6294, 
                        lng: 124.605 
                    });
                }
            } catch (err) { alert(err.message); }
        };

        window.logout = async () => {
            if(userData?.role === 'driver') await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: false });
            await signOut(auth);
            location.reload();
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                userUid = u.uid;
                const snap = await getDoc(doc(db, COLL_PATH, userUid));
                userData = snap.data();
                launchApp();
            } else document.getElementById('auth-screen').classList.remove('hidden');
        });

        // APP CORE
        function launchApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-ui').classList.replace('hidden', 'flex');
            document.getElementById('user-display').innerText = userData.name;
            document.getElementById('role-display').innerText = userData.role;
            document.getElementById(userData.role + '-panel').classList.remove('hidden');

            map = L.map('map', { zoomControl: false }).setView([6.6294, 124.605], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    if(Date.now() - lastUpdate > 5000) { 
                        lastUpdate = Date.now();
                        updateDoc(doc(db, COLL_PATH, userUid), { lat: latitude, lng: longitude });
                    }
                });
            }
            listen();
        }

        // REAL-TIME LISTENER
        function listen() {
            onSnapshot(collection(db, COLL_PATH), snap => {
                const list = document.getElementById('driver-list');
                if(userData.role === 'passenger') list.innerHTML = '';
                
                snap.forEach(dDoc => {
                    const data = dDoc.data();
                    const id = dDoc.id;

                    if(id === userUid) {
                        userData = data;
                        updateDutyUI();
                        return;
                    }

                    if(userData.role === 'passenger' && data.role === 'driver' && data.isOnline && !data.request) {
                        renderDriverCard(id, data);
                    }
                });
            });
        }

        // SUBSCRIPTION LOGIC
        function updateDutyUI() {
            if(userData.role !== 'driver') return;
            const tag = document.getElementById('expiry-tag');
            const now = Date.now();
            const isActive = userData.subscriptionExpiry > now;

            if(isActive) {
                const hoursLeft = Math.round((userData.subscriptionExpiry - now) / (1000 * 60 * 60));
                tag.innerText = `PASS ACTIVE: ${hoursLeft}H LEFT`;
                tag.className = "text-[10px] font-black px-3 py-1 rounded-full bg-emerald-100 text-emerald-600 uppercase";
            } else {
                tag.innerText = "PASS EXPIRED - TOP UP TO WORK";
                tag.className = "text-[10px] font-black px-3 py-1 rounded-full bg-red-100 text-red-600 uppercase";
                if(userData.isOnline) toggleDuty(); // Force offline
            }
        }

        window.toggleDuty = async () => {
            const now = Date.now();
            if(!userData.isOnline && (!userData.subscriptionExpiry || now > userData.subscriptionExpiry)) {
                document.getElementById('payment-modal').classList.remove('hidden');
                return;
            }

            const s = !userData.isOnline;
            const b = document.getElementById('duty-btn');
            b.innerText = s ? "GO OFFLINE" : "GO ONLINE";
            b.className = s ? "w-full py-12 bg-emerald-600 text-white rounded-[2.5rem] font-black text-3xl shadow-lg" : "w-full py-12 bg-gray-100 text-gray-400 rounded-[2.5rem] font-black text-3xl";
            await updateDoc(doc(db, COLL_PATH, userUid), { isOnline: s });
        };

        window.closePayment = () => document.getElementById('payment-modal').classList.add('hidden');

        // GCASH PAYMENT SIMULATION (Integrate PayMongo/Xendit here)
        window.payWithGCash = async () => {
            const btn = event.target;
            btn.innerText = "PROCESSING...";
            
            // SIMULATING SUCCESSFUL API CALLBACK
            setTimeout(async () => {
                const newExpiry = Date.now() + (24 * 60 * 60 * 1000); // +24 Hours
                await updateDoc(doc(db, COLL_PATH, userUid), { subscriptionExpiry: newExpiry });
                alert("Payment Successful! Your 24-hour pass is now active.");
                closePayment();
            }, 2000);
        };

        function renderDriverCard(id, data) {
            document.getElementById('driver-list').innerHTML += `
                <div class="p-4 bg-white border border-gray-100 rounded-3xl flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fa-solid fa-motorcycle"></i></div>
                        <p class="font-black text-gray-800 text-sm">${data.name}</p>
                    </div>
                    <button onclick="alert('Booking logic triggered')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-black">BOOK</button>
                </div>`;
        }
    </script>
</body>
</html>
